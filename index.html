<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Pour Melody</title>
    <link href="https://fonts.googleapis.com/css2?family=Long+Cang&display=swap" rel="stylesheet">
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            font-family: "Long Cang", cursive;
            background: #000;
            user-select: none;
            -webkit-user-select: none;
        }

        #wrap {
            position: relative;
            width: 100%;
            height: 100%;
            background: url('./background.jpg') no-repeat center center;
            background-size: cover;
        }

        #wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(15, 20, 40, 0.2) 0%, rgba(15, 20, 40, 0.9) 100%);
            pointer-events: none;
            z-index: 0;
        }

        #stage {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: pointer;
        }

        #controls {
            position: absolute;
            bottom: 120px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 20;
            pointer-events: none;
        }

        #next-btn {
            pointer-events: auto;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            padding: 10px;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
            /* Remove box-shadow/background for cleaner arrow look, or keep minimal */
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.5));
        }

        #next-btn:hover {
            color: #fff;
            transform: scale(1.2);
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.8));
        }

        #next-btn:active {
            transform: scale(0.9);
        }

        @keyframes pulse-btn {
            0% {
                opacity: 0.8;
            }

            50% {
                opacity: 1;
                text-shadow: 0 0 10px #fff;
            }

            100% {
                opacity: 0.8;
            }
        }

        @keyframes pulse-arrow {

            0%,
            100% {
                transform: translateY(0);
                opacity: 0.7;
            }

            50% {
                transform: translateY(-5px);
                opacity: 1;
            }
        }

        #next-btn {
            animation: pulse-arrow 2s infinite;
        }
    </style>
</head>

<body>
    <div id="wrap">
        <canvas id="stage"></canvas>
        <div id="controls">
            <button id="next-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M7 13l5 5 5-5M7 6l5 5 5-5" />
                </svg>
            </button>
        </div>
    </div>
    <audio id="bgm" src="./RiverFlowsInYou.mp3" loop></audio>


    <script>
        (function () {
            const canvas = document.getElementById('stage');
            const ctx = canvas.getContext('2d');
            const btn = document.getElementById('next-btn');
            const audio = document.getElementById('bgm');

            // Audio Fade-in Logic
            let audioPlayed = false;
            function playAudio() {
                if (audioPlayed) return;
                audio.volume = 0;
                const p = audio.play();
                if (p) {
                    p.then(() => {
                        audioPlayed = true;
                        let vol = 0;
                        const timer = setInterval(() => {
                            vol += 0.05;
                            if (vol >= 1) {
                                vol = 1;
                                clearInterval(timer);
                            }
                            audio.volume = vol;
                        }, 200);
                    }).catch(() => { console.log("Autoplay blocked"); });
                }
            }
            window.addEventListener('click', playAudio);
            window.addEventListener('touchstart', playAudio);
            playAudio(); // Try immediately


            const CONFIG = {
                heartColor: '#ff3050',
                particleCount: 2000,
                snowCount: 200,
                fov: 400,
                mobileScale: 1.0,
                stepTexts: [
                    "Melody",
                    "Eddy想对你说：",
                    "Je t'aime de tout mon coeur."
                ]
            };

            const state = {
                w: 0, h: 0,
                heartPoints: [],
                fireworks: [],
                snow: [],
                angleY: 0,
                throb: 0,
                currentStep: -1,
                activeTexts: [],
            };

            function resize() {
                const dpr = Math.min(window.devicePixelRatio || 1, 2.5);
                const w = window.innerWidth;
                const h = window.innerHeight;
                canvas.width = w * dpr;
                canvas.height = h * dpr;
                state.w = w; state.h = h;
                ctx.scale(dpr, dpr);
                CONFIG.mobileScale = w < 500 ? 0.7 : 1.0;
            }
            window.addEventListener('resize', resize);

            // 3D Heart: Extruded 2D Heart (Puffy)
            function generateHeartPoints() {
                const points = [];
                for (let i = 0; i < CONFIG.particleCount; i++) {
                    // Uniform random for angle
                    const t = Math.random() * Math.PI * 2;
                    // Non-uniform random for "filling"
                    // Most particles should be near surface or distributed in volume?
                    // sqrt(random) gives uniform disk distribution.
                    const r = Math.pow(Math.random(), 0.5);

                    // 2D Heart Formula
                    const hx = 16 * Math.pow(Math.sin(t), 3);
                    const hy = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));

                    // Scale by radius r to fill the shape
                    const px = hx * r;
                    const py = hy * r;

                    // Thickness logic: thicker in center (r=0), thinner at edge (r=1)
                    // Profile: Elliptical approximation z^2/a^2 + r^2/1 = 1 => z = a * sqrt(1-r^2) ??
                    // Or simply linear taper?
                    // Let's use a nice rounded profile.
                    // max depth 10.
                    const depth = 10 * Math.sqrt(Math.max(0, 1 - r));
                    const z = (Math.random() * 2 - 1) * depth;

                    points.push({
                        x: px * 14, // Scale x/y
                        y: py * 14,
                        z: z * 14,   // Scale z same amount
                        r: r // Store normalized radius for color gradient
                    });
                }
                return points;
            }

            function initSnow() {
                state.snow = [];
                for (let i = 0; i < CONFIG.snowCount; i++) {
                    state.snow.push({
                        x: Math.random() * state.w,
                        y: Math.random() * state.h,
                        z: Math.random() * 2 + 1,
                        size: Math.random() * 2 + 1,
                        opacity: Math.random() * 0.5 + 0.3
                    });
                }
            }

            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                state.currentStep++;
                if (state.currentStep >= CONFIG.stepTexts.length) {
                    btn.style.display = 'none';
                    for (let i = 0; i < 5; i++) {
                        setTimeout(() => spawnFirework(state.w / 2 + (Math.random() - 0.5) * 200, state.h / 2 + (Math.random() - 0.5) * 200), i * 200);
                    }
                    return;
                }
                const textStr = CONFIG.stepTexts[state.currentStep];
                state.activeTexts = [];
                state.activeTexts.push({
                    str: textStr,
                    x: state.w / 2,
                    y: state.h / 2,
                    targetY: state.h * 0.35,
                    alpha: 0,
                    scale: 0.5,
                    life: 1.0
                });
                // If finished, hide button immediately
                if (state.currentStep >= CONFIG.stepTexts.length - 1) {
                    btn.style.opacity = '0';
                    setTimeout(() => btn.style.display = 'none', 500);
                }
                spawnFirework(state.w / 2, state.h / 2);
            });

            canvas.addEventListener('mousedown', (e) => {
                const x = e.clientX || e.changedTouches?.[0]?.clientX;
                const y = e.clientY || e.changedTouches?.[0]?.clientY;
                spawnFirework(x, y);
            });
            canvas.addEventListener('touchstart', (e) => {
                const x = e.changedTouches[0].clientX;
                const y = e.changedTouches[0].clientY;
                spawnFirework(x, y);
            }, { passive: false });

            function spawnFirework(x, y) {
                const palette = ['#FFD700', '#FF6347', '#00FFFF', '#FF69B4', '#FFF'];
                const count = 50;
                const group = [];
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const v = Math.random() * 4 + 2;
                    group.push({
                        x, y,
                        vx: Math.cos(angle) * v,
                        vy: Math.sin(angle) * v,
                        life: 1.0,
                        decay: Math.random() * 0.02 + 0.015,
                        color: palette[Math.floor(Math.random() * palette.length)]
                    });
                }
                state.fireworks.push(group);
            }

            let lastTime = 0;
            function loop(time) {
                const dt = (time - lastTime) / 1000;
                lastTime = time;
                const { w, h, heartPoints } = state;

                ctx.clearRect(0, 0, w, h);

                // Snow
                ctx.fillStyle = '#fff';
                state.snow.forEach(p => {
                    p.y += p.z * 20 * dt;
                    p.x += Math.sin(time * 0.001 + p.z) * 20 * dt;
                    if (p.y > h) p.y = -10;
                    if (p.x > w) p.x = -10;
                    if (p.x < -10) p.x = w;
                    ctx.globalAlpha = p.opacity;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * CONFIG.mobileScale, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;

                // Heart
                state.throb += dt * 3;
                const sway = Math.sin(time * 0.001) * 0.05; // Less sway
                const beat = 1 + 0.12 * Math.pow(Math.abs(Math.sin(state.throb)), 8);

                const cx = w / 2;
                const cy = h / 2 - 30;

                const cosR = Math.cos(sway);
                const sinR = Math.sin(sway);

                heartPoints.forEach(p => {
                    // Rotate Y
                    const rx = p.x * cosR - p.z * sinR;
                    const rz = p.x * sinR + p.z * cosR;
                    const ry = p.y;

                    const fx = rx * beat;
                    const fy = ry * beat;
                    const fz = rz * beat;

                    const scale = CONFIG.fov / (CONFIG.fov - fz);
                    const x2d = cx + fx * scale;
                    const y2d = cy + fy * scale;
                    const size = Math.max(0.6, scale * 1.8);

                    if (scale > 0 && scale < 5) {
                        // Gradient color based on r (0=center, 1=edge)
                        // Center: Warm Orange (#FFD194), Edge: Hot Pink (#D04ED6)
                        // Interpolate
                        const rVal = p.r;
                        // Simple linear interpolation
                        // We can't do complex gradient per pixel efficiently.
                        // Let's pick color steps.
                        // Gold: 255, 215, 0 (center) to OrangeRed: 255, 69, 0 (edge)
                        // Let's try: Center RGB(255, 200, 100) -> Edge RGB(255, 50, 80)

                        // Glow
                        ctx.shadowBlur = 10 * scale;
                        ctx.shadowColor = 'rgba(255, 50, 80, 0.5)';

                        // Color
                        ctx.fillStyle = rVal < 0.5 ? '#ffce9e' : '#ff4d6d'; // Simple 2-tone for performance or full calc?
                        // Let's do partial mix for better look?
                        // Actually just setting a nice fixed gradient logic might be too heavy for fillStyle every dot?
                        // No, fillStyle string parsing is fast enough for 2000 points.
                        // Let's use HSLA. Orange=30, Pink=340. 
                        // 30 -> -20 (340).
                        const hue = 30 - rVal * 50; // 30 down to -20 (340)
                        const light = 60 + rVal * 10;
                        ctx.fillStyle = `hsl(${hue}, 80%, ${light}%)`;

                        ctx.globalAlpha = Math.min(1, scale * 0.5 + 0.5);
                        ctx.fillRect(x2d, y2d, size, size);
                        ctx.shadowBlur = 0; // Reset
                    }
                });
                ctx.globalAlpha = 1;

                // Text
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                state.activeTexts.forEach((t) => {
                    if (t.alpha < 1) t.alpha += dt * 1.5;
                    if (t.scale < 1) t.scale += dt * 1.5;
                    t.y += (t.targetY - t.y) * 0.1;

                    ctx.save();
                    ctx.globalAlpha = Math.min(1, t.alpha);

                    ctx.font = `bold ${32 * CONFIG.mobileScale}px "Long Cang", cursive`;
                    ctx.shadowColor = 'rgba(255, 100, 100, 0.8)';
                    ctx.shadowBlur = 15;
                    ctx.fillStyle = '#fff';

                    ctx.translate(t.x, t.y);
                    const curScale = Math.min(1, t.scale);
                    ctx.scale(curScale, curScale);

                    ctx.fillText(t.str, 0, 0);
                    ctx.restore();
                });

                // Footer
                const bottomY = h - 40;
                const start = new Date('2025-05-17T00:00:00');
                const now = new Date();
                const days = Math.floor((now - start) / 86400000);
                const dayStr = days < 0 ? `距离2025.05.17还有 ${Math.abs(days)} 天` : `我们在一起 ${days} 天了`;

                ctx.shadowBlur = 4;
                ctx.shadowColor = 'rgba(0,0,0,1)';
                ctx.fillStyle = 'rgba(255,255,255,0.95)';
                ctx.font = `300 ${16 * CONFIG.mobileScale}px "Long Cang", cursive`;
                ctx.fillText(dayStr, cx, bottomY);

                ctx.font = `italic ${14 * CONFIG.mobileScale}px "Long Cang", cursive`;
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.fillText("我们的故事还在继续...", cx, bottomY + 24);

                // Fireworks
                for (let i = state.fireworks.length - 1; i >= 0; i--) {
                    const parts = state.fireworks[i];
                    let alive = false;
                    ctx.globalCompositeOperation = 'lighter';
                    for (let j = 0; j < parts.length; j++) {
                        const p = parts[j];
                        if (p.life <= 0) continue;
                        alive = true;
                        p.x += p.vx; p.y += p.vy;
                        p.vy += 0.08;
                        p.vx *= 0.98; p.vy *= 0.98;
                        p.life -= p.decay;

                        ctx.fillStyle = p.color;
                        ctx.globalAlpha = p.life;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.globalAlpha = 1;
                    if (!alive) state.fireworks.splice(i, 1);
                }
                requestAnimationFrame(loop);
            }

            resize();
            state.heartPoints = generateHeartPoints();
            initSnow();
            requestAnimationFrame(loop);

        })();
    </script>
</body>

</html>
