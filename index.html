            // ===== Main loop =====
            let lastTime = 0;

            function loop(time) {
                // Fix: first-frame dt was huge because lastTime started at 0
                if (lastTime === 0) lastTime = time;
                const dt = Math.min(0.05, (time - lastTime) / 1000);
                lastTime = time;
                const { w, h, heartPoints } = state;

                ctx.clearRect(0, 0, w, h);

                // ----- Theme color lerp -----
                const targetIdx = Math.max(0, Math.min(CONFIG.themes.length - 1, state.currentStep + 1));
                // Festival theme (if active today) overrides the default theme palette
                const target = festivalOverride || CONFIG.themes[targetIdx];
                state.themeBlend.hueCenter = lerpHue(state.themeBlend.hueCenter, target.hueCenter, dt * 1.5);
                state.themeBlend.hueEdge = lerpHue(state.themeBlend.hueEdge, target.hueEdge, dt * 1.5);
                if (Math.abs(state.themeBlend.hueCenter - lastBakedHueCenter) > 1.5 || sprites.length === 0) {
                    bakeSprites();
                }

                // ----- Snowflakes -----
                for (let i = 0; i < state.petals.length; i++) {
                    const p = state.petals[i];
                    p.y += p.speed * 22 * dt;
                    p.x += Math.sin(time * 0.0006 + p.swayPhase) * 14 * dt;
                    p.rotation += p.rotationSpeed * dt;
                    if (p.y > h + 30) { p.y = -30; p.x = Math.random() * w; }
                    if (p.x > w + 30) p.x = -30;
                    if (p.x < -30) p.x = w + 30;
                    const size = p.size * CONFIG.mobileScale;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation);
                    ctx.globalAlpha = p.opacity;
                    ctx.drawImage(snowflakeSprite, -size, -size, size * 2, size * 2);
                    ctx.restore();
                }
                ctx.globalAlpha = 1;

                // ----- Heart -----
                // Beat boost: when active throbs ~2.5x faster, decays in ~800ms
                if (state.beatBoost > 0) state.beatBoost = Math.max(0, state.beatBoost - dt * 1.25);
                const throbSpeed = 3 + state.beatBoost * 6;
                state.throb += dt * throbSpeed;
                const beatAmp = 0.12 + state.beatBoost * 0.08;
                const beat = 1 + beatAmp * Math.pow(Math.abs(Math.sin(state.throb)), 8);

                const sway = Math.sin(time * 0.001) * 0.05;

                // Smoothed mouse-influence: heart slightly leans toward cursor, brightens when close
                if (state.mouse.hasMoved) {
                    const targetDx = (state.mouse.x - w / 2) * 0.05;
                    const targetDy = (state.mouse.y - (h / 2 - 30)) * 0.05;
                    state.mouseInfluence.dx += (targetDx - state.mouseInfluence.dx) * Math.min(1, dt * 4);
                    state.mouseInfluence.dy += (targetDy - state.mouseInfluence.dy) * Math.min(1, dt * 4);
                    const distToHeart = Math.hypot(state.mouse.x - w / 2, state.mouse.y - (h / 2 - 30));
                    const proximity = Math.max(0, 1 - distToHeart / 350);
                    state.mouseInfluence.brightness += (proximity - state.mouseInfluence.brightness) * Math.min(1, dt * 3);
                } else {
                    state.mouseInfluence.dx *= 0.96;
                    state.mouseInfluence.dy *= 0.96;
                    state.mouseInfluence.brightness *= 0.96;
                }
                const cx = w / 2 + state.mouseInfluence.dx;
                const cy = h / 2 - 30 + state.mouseInfluence.dy;
                const brightBoost = state.mouseInfluence.brightness * 0.18;

                const cosR = Math.cos(sway);
                const sinR = Math.sin(sway);

                // Update morph timeline
                let morphMix = 0; // 0 = original heart, 1 = full text shape
                if (state.morph.phase !== 'idle' && state.morph.hasTargets) {
                    state.morph.progress += dt;
                    if (state.morph.phase === 'forward') {
                        const t = Math.min(1, state.morph.progress / 1.6);
                        morphMix = t * t * (3 - 2 * t); // smoothstep ease
                        if (t >= 1) { state.morph.phase = 'hold'; state.morph.progress = 0; }
                    } else if (state.morph.phase === 'hold') {
                        morphMix = 1;
                        if (state.morph.progress >= 1.5) { state.morph.phase = 'backward'; state.morph.progress = 0; }
                    } else if (state.morph.phase === 'backward') {
                        const t = Math.min(1, state.morph.progress / 1.6);
                        morphMix = 1 - t * t * (3 - 2 * t);
                        if (t >= 1) { state.morph.phase = 'idle'; state.morph.progress = 0; }
                    }
                }
                // Letter reveal: pause when morphing (don't fight for control)
                const letterReveal = (state.currentStep >= 1 && morphMix === 0) ? 0.32 : 0;

                // Build render list (with z for sorting)
                const renderList = [];
                for (let i = 0; i < heartPoints.length; i++) {
                    const p = heartPoints[i];
                    // Decay burst velocity
                    if (p.burstX !== 0 || p.burstY !== 0) {
                        p.burstX *= 0.88;
                        p.burstY *= 0.88;
                        if (Math.abs(p.burstX) < 0.05) p.burstX = 0;
                        if (Math.abs(p.burstY) < 0.05) p.burstY = 0;
                    }
                    let basePx = p.x + p.burstX, basePy = p.y + p.burstY;
                    if (p.isLetter && letterReveal > 0) {
                        basePx = lerp(basePx, p.letterX, letterReveal);
                        basePy = lerp(basePy, p.letterY, letterReveal);
                    }
                    if (morphMix > 0) {
                        basePx = lerp(basePx, p.morphX, morphMix);
                        basePy = lerp(basePy, p.morphY, morphMix);
                    }
                    const rx = basePx * cosR - p.z * sinR;
                    const rz = basePx * sinR + p.z * cosR;
                    const ry = basePy;
                    const fx = rx * beat;
                    const fy = ry * beat;
                    const fz = rz * beat;
                    const scale = CONFIG.fov / (CONFIG.fov - fz);
                    if (scale > 0 && scale < 5) {
                        renderList.push({
                            x: cx + fx * scale,
                            y: cy + fy * scale,
                            size: Math.max(1.4, scale * 2.7 * CONFIG.mobileScale),
                            alpha: Math.min(1, scale * 0.45 + 0.6 + brightBoost),
                            colorIdx: p.colorIdx,
                            isLetter: p.isLetter,
                            fz
                        });
                    }
                }
                renderList.sort((a, b) => a.fz - b.fz);

                // Use additive 'lighter' compositing so overlapping particles glow brighter.
                // With the central-axis thinning we did at generate-time, the streak risk is gone.
                ctx.globalCompositeOperation = 'lighter';
                for (let i = 0; i < renderList.length; i++) {
                    const p = renderList[i];
                    const sprite = (p.isLetter && letterReveal > 0) ? letterSprite : sprites[p.colorIdx];
                    if (!sprite) continue;
                    ctx.globalAlpha = Math.min(1, p.alpha * 0.7);
                    ctx.drawImage(sprite, p.x - p.size, p.y - p.size, p.size * 2, p.size * 2);
                }
                ctx.globalCompositeOperation = 'source-over';
                ctx.globalAlpha = 1;

                // ----- Ripples (expanding rings from heart taps) -----
                for (let i = state.ripples.length - 1; i >= 0; i--) {
                    const ring = state.ripples[i];
                    ring.radius += dt * 380;
                    ring.alpha -= dt * 1.2;
                    if (ring.alpha <= 0) { state.ripples.splice(i, 1); continue; }
                    ctx.save();
                    ctx.strokeStyle = `hsla(${state.themeBlend.hueEdge.toFixed(0)}, 85%, 75%, ${ring.alpha})`;
                    ctx.lineWidth = 2 + (1 - ring.alpha) * 3;
                    ctx.beginPath();
                    ctx.arc(ring.x, ring.y, ring.radius, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                }

                // ----- Static French confession -----
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.save();
                ctx.font = `italic ${26 * CONFIG.mobileScale}px "Long Cang", cursive`;
                ctx.shadowColor = `hsla(${state.themeBlend.hueEdge.toFixed(0)}, 80%, 60%, 0.85)`;
                ctx.shadowBlur = 18;
                ctx.fillStyle = 'rgba(255,255,255,0.96)';
                ctx.fillText("Je t'aime de tout mon cœur.", cx, h - 110);
                ctx.restore();

                // ----- Trail hearts -----
                ctx.globalCompositeOperation = 'lighter';
                for (let i = state.trailHearts.length - 1; i >= 0; i--) {
                    const th = state.trailHearts[i];
                    th.x += th.vx;
                    th.y += th.vy;
                    th.vy += 0.01;
                    th.life -= dt * 0.7;
                    if (th.life <= 0) { state.trailHearts.splice(i, 1); continue; }
                    ctx.save();
                    ctx.globalAlpha = Math.max(0, th.life * 0.85);
                    ctx.translate(th.x, th.y);
                    ctx.scale(th.scale, th.scale);
                    ctx.fillStyle = `hsl(${th.hue.toFixed(0)}, 85%, 72%)`;
                    ctx.beginPath();
                    for (let s = 0; s <= 28; s++) {
                        const ts = (s / 28) * Math.PI * 2;
                        const hx = 16 * Math.pow(Math.sin(ts), 3);
                        const hy = -(13 * Math.cos(ts) - 5 * Math.cos(2 * ts) - 2 * Math.cos(3 * ts) - Math.cos(4 * ts));
                        if (s === 0) ctx.moveTo(hx, hy);
                        else ctx.lineTo(hx, hy);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                }
                ctx.globalCompositeOperation = 'source-over';
                ctx.globalAlpha = 1;

                // ----- Footer (live counter) -----
                const bottomY = h - 40;
                const start = new Date('2025-05-17T00:00:00');
                const nowMs = Date.now();
                const diffMs = nowMs - start.getTime();
                let dayStr;
                if (diffMs < 0) {
                    const days = Math.ceil(-diffMs / 86400000);
                    dayStr = `距离 2025.05.17 还有 ${days} 天`;
                } else {
                    const totalSec = Math.floor(diffMs / 1000);
                    const days = Math.floor(totalSec / 86400);
                    const hours = Math.floor((totalSec % 86400) / 3600);
                    const mins = Math.floor((totalSec % 3600) / 60);
                    const secs = totalSec % 60;
                    dayStr = `我们在一起 ${days} 天 ${hours} 时 ${mins} 分 ${secs} 秒`;
                }
                ctx.save();
                ctx.shadowBlur = 4;
                ctx.shadowColor = 'rgba(0,0,0,1)';
                ctx.fillStyle = 'rgba(255,255,255,0.95)';
                ctx.font = `300 ${16 * CONFIG.mobileScale}px "Long Cang", cursive`;
                ctx.fillText(dayStr, cx, bottomY);
                ctx.font = `italic ${14 * CONFIG.mobileScale}px "Long Cang", cursive`;
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.fillText("我们的故事还在继续...", cx, bottomY + 24);
                ctx.restore();

                // ----- Fireworks (streaks + heart tips) -----
                for (let i = state.fireworks.length - 1; i >= 0; i--) {
                    const parts = state.fireworks[i];
                    let alive = false;
                    ctx.globalCompositeOperation = 'lighter';
                    ctx.lineCap = 'round';
                    for (let j = 0; j < parts.length; j++) {
                        const p = parts[j];
                        if (p.life <= 0) continue;
                        alive = true;
                        // Physics
                        p.x += p.vx; p.y += p.vy;
                        p.vy += 0.085;          // gravity → natural downward arc
                        p.vx *= 0.985; p.vy *= 0.985;
                        p.life -= p.decay;
                        // Record trail
                        p.trail.push({ x: p.x, y: p.y });
                        if (p.trail.length > FIREWORK_TRAIL_LEN) p.trail.shift();
                        // Draw tapered streak: each segment fades + thins toward the tail
                        const trail = p.trail;
                        const lifeAlpha = Math.min(1, p.life);
                        ctx.strokeStyle = p.color;
                        for (let k = 1; k < trail.length; k++) {
                            const ageFactor = k / trail.length;   // 0 oldest → 1 newest
                            ctx.globalAlpha = lifeAlpha * ageFactor * 0.9;
                            ctx.lineWidth = ageFactor * 2.2 + 0.3;
                            ctx.beginPath();
                            ctx.moveTo(trail[k - 1].x, trail[k - 1].y);
                            ctx.lineTo(trail[k].x, trail[k].y);
                            ctx.stroke();
                        }
                        // Draw a small heart at the tip
                        ctx.globalAlpha = lifeAlpha;
                        ctx.fillStyle = p.color;
                        ctx.save();
                        ctx.translate(p.x, p.y);
                        ctx.scale(0.18, 0.18);
                        ctx.beginPath();
                        for (let s = 0; s <= 24; s++) {
                            const tt = (s / 24) * Math.PI * 2;
                            const hx = 16 * Math.pow(Math.sin(tt), 3);
                            const hy = -(13 * Math.cos(tt) - 5 * Math.cos(2 * tt) - 2 * Math.cos(3 * tt) - Math.cos(4 * tt));
                            if (s === 0) ctx.moveTo(hx, hy);
                            else ctx.lineTo(hx, hy);
                        }
                        ctx.closePath();
                        ctx.fill();
                        ctx.restore();
                    }
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.globalAlpha = 1;
                    if (!alive) state.fireworks.splice(i, 1);
                }

                requestAnimationFrame(loop);
            }

            // ===== PWA install + cross-device push notifications =====
            //
            // Strategy (zero-server / zero-FCM):
            //   - Register service worker so the app is installable and stays alive in the
            //     background on mobile when added to home screen.
            //   - When pingsBackend pushes new pings, if any are from the OTHER person and
            //     newer than the last seen ping at page load, fire a local Notification.
            //   - The notification UI works in foreground (Notification.show) and background
            //     (service worker registration.showNotification, surviving page minimize).
            //   - iOS: requires the page to have been installed to home screen (manifest)
            //     AND iOS 16.4+. We show a one-time hint to Eddy/Melody if they're on iOS.
            const pwa = {
                swRegistration: null,
                lastSeenPingTs: 0,   // initialized after first pingsBackend snapshot
                bootstrapped: false, // suppress notifications on the very first snapshot

                async init() {
                    // Register service worker (best-effort — fail silent on older browsers)
                    if ('serviceWorker' in navigator) {
                        try {
                            this.swRegistration = await navigator.serviceWorker.register('./service-worker.js');
                            console.log('[pwa] service worker registered');
                        } catch (e) {
                            console.warn('[pwa] service worker registration failed:', e);
                        }
                    }
                    // Subscribe to ping events for cross-device notifications
                    pingsBackend.subscribe((pings) => this.onPingsChanged(pings));

                    // iOS PWA hint — show once if (a) iOS, (b) Safari (not yet in PWA), (c) not previously dismissed
                    this.maybeShowIosHint();
                },

                onPingsChanged(pings) {
                    if (!pings || pings.length === 0) return;
                    const newestTs = pings[0].ts;
                    if (!this.bootstrapped) {
                        // On first load, remember the current newest ping so we don't notify
                        // for everything that happened while the user was away — they'll see
                        // those in the banner already.
                        this.lastSeenPingTs = newestTs;
                        this.bootstrapped = true;
                        return;
                    }
                    // Find pings that are (a) newer than what we've seen, (b) from the OTHER person
                    const otherPerson = currentViewer === 'Eddy' ? 'Melody' : 'Eddy';
                    const fresh = pings.filter(p => p.ts > this.lastSeenPingTs && p.from === otherPerson);
                    if (fresh.length > 0) {
                        this.notify(otherPerson, fresh.length);
                    }
                    this.lastSeenPingTs = Math.max(this.lastSeenPingTs, newestTs);
                },

                async ensurePermission() {
                    if (!('Notification' in window)) return false;
                    if (Notification.permission === 'granted') return true;
                    if (Notification.permission === 'denied') return false;
                    try {
                        const result = await Notification.requestPermission();
                        return result === 'granted';
                    } catch (e) {
                        return false;
                    }
                },

                async notify(fromWho, count) {
                    if (!('Notification' in window) || Notification.permission !== 'granted') return;
                    const title = `${fromWho} 想你了 ❤`;
                    const body = count > 1 ? `刚刚收到 ${count} 次想念 · 快看看 ♪` : '此刻，正在想你 ♪';
                    const options = {
                        body,
                        icon: './icon.svg',
                        badge: './icon.svg',
                        tag: 'pour-melody-miss',  // collapse multiple notifications
                        renotify: true,
                        vibrate: [120, 60, 120],
                        data: { url: location.href }
                    };
                    try {
                        // Prefer service-worker registration (works while tab is in background)
                        if (this.swRegistration && this.swRegistration.showNotification) {
                            await this.swRegistration.showNotification(title, options);
                        } else {
                            new Notification(title, options);
                        }
                    } catch (e) {
                        console.warn('[pwa] notify failed:', e);
                    }
                },

                maybeShowIosHint() {
                    const ua = navigator.userAgent || '';
                    const isIos = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
                    const isStandalone = window.matchMedia('(display-mode: standalone)').matches
                                      || window.navigator.standalone === true;
                    if (!isIos || isStandalone) return;
                    if (localStorage.getItem('pourMelodyIosHintShown') === '1') return;
                    // Show a soft hint after a short delay
                    setTimeout(() => {
                        const hint = document.createElement('div');
                        hint.className = 'ios-hint';
                        hint.innerHTML = `
                            <div class="ios-hint-card">
                                <div class="ios-hint-title">想收到对方想念你的通知吗？</div>
                                <div class="ios-hint-body">
                                    在 Safari 里点底部 <b>分享按钮 ⬆</b>，选择「添加到主屏幕」，<br/>
                                    然后从主屏图标打开就可以收到推送啦 ♪
                                </div>
                                <button class="ios-hint-close" type="button">知道了</button>
                            </div>`;
                        document.body.appendChild(hint);
                        requestAnimationFrame(() => hint.classList.add('show'));
                        hint.querySelector('.ios-hint-close').addEventListener('click', () => {
                            hint.classList.remove('show');
                            setTimeout(() => hint.remove(), 300);
                            localStorage.setItem('pourMelodyIosHintShown', '1');
                        });
                    }, 4000);
                }
            };
            pwa.init();

            // Request notification permission the first time the user taps the heart
            // (a real gesture is required for the prompt to appear on most browsers).
            // We piggy-back on the existing miss-ping flow.
            (function wireNotificationPermissionAsk() {
                if (!('Notification' in window)) return;
                if (Notification.permission !== 'default') return;  // already granted or denied
                let asked = false;
                const ask = async () => {
                    if (asked) return;
                    asked = true;
                    // Slight delay so the first ping toast finishes first
                    setTimeout(() => pwa.ensurePermission(), 800);
                };
                // First tap (mouse or touch) anywhere triggers it
                stage.addEventListener('click', ask, { once: true });
                stage.addEventListener('touchstart', ask, { once: true });
            })();

            // ===== Boot =====
            resize();
            state.heartPoints = generateHeartPoints();
            initPetals();
            bakeSprites();
            requestAnimationFrame(loop);

        })();
    </script>
</body>

</html>
