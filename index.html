    <script>
        (function () {
            // ===== Firebase backend (single point of swap if migrating later) =====
            const FIREBASE_CONFIG = {
                apiKey: "AIzaSyClypDtMWUcV7WS0LGgEcLeIMTpZncIXO8",
                authDomain: "heart-version3.firebaseapp.com",
                projectId: "heart-version3",
                storageBucket: "heart-version3.firebasestorage.app",
                messagingSenderId: "539811221901",
                appId: "1:539811221901:web:608735f5cb7fb4442cadc4"
            };
            const SHARED_EMAIL = "eddy&melody@love-forever.app";  // shared account identifier, password is private
            const SHARED_UID = "uq8ClQFBlkeQJQYgCW8RHmZpkla2";    // referenced for sanity check
            let fbDb = null, fbStorage = null, fbAuth = null;
            try {
                if (typeof firebase !== 'undefined') {
                    firebase.initializeApp(FIREBASE_CONFIG);
                    fbDb = firebase.firestore();
                    fbStorage = firebase.storage();
                    fbAuth = firebase.auth();
                    // LOCAL persistence (browser remembers across sessions — default but make explicit)
                    fbAuth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(() => {});
                    fbDb.enablePersistence({ synchronizeTabs: true }).catch(() => {});
                }
            } catch (e) { console.warn('[firebase] init failed', e); }

            // ===== Auth gate (shared password sign-in + identity picker) =====
            const authGate = document.getElementById('auth-gate');
            const authPasswordInput = document.getElementById('auth-password');
            const authSubmitBtn = document.getElementById('auth-submit');
            const authErrorEl = document.getElementById('auth-error');
            const authIdentityWrap = document.getElementById('auth-identity');
            const VIEWER_KEY_AT_AUTH = 'pourMelodyViewerAs';

            // Initialize identity selection from last-used (or default Eddy)
            let pendingIdentity = (localStorage.getItem(VIEWER_KEY_AT_AUTH) === 'Melody') ? 'Melody' : 'Eddy';
            function applyAuthIdentityActive() {
                authIdentityWrap.querySelectorAll('.auth-identity-btn').forEach(b => {
                    b.classList.toggle('active', b.getAttribute('data-identity') === pendingIdentity);
                });
            }
            applyAuthIdentityActive();
            authIdentityWrap.addEventListener('click', (e) => {
                const btn = e.target.closest('.auth-identity-btn');
                if (!btn) return;
                pendingIdentity = btn.getAttribute('data-identity');
                applyAuthIdentityActive();
            });

            function showAuthGate() {
                authGate.classList.remove('hidden');
                authGate.style.display = 'flex';
                authErrorEl.textContent = '';
                setTimeout(() => authPasswordInput.focus(), 100);
            }
            function hideAuthGate() {
                authGate.classList.add('hidden');
                setTimeout(() => { authGate.style.display = 'none'; }, 520);
            }
            async function submitAuth() {
                const pwd = authPasswordInput.value;
                if (!pwd) {
                    authErrorEl.textContent = '请输入密码';
                    return;
                }
                if (!fbAuth) {
                    authErrorEl.textContent = '云端未连接，请检查网络';
                    return;
                }
                authSubmitBtn.disabled = true;
                authErrorEl.textContent = '验证中…';
                try {
                    await fbAuth.signInWithEmailAndPassword(SHARED_EMAIL, pwd);
                    // Save identity now that login succeeded + sync to moments-side state
                    localStorage.setItem(VIEWER_KEY_AT_AUTH, pendingIdentity);
                    try {
                        currentViewer = pendingIdentity;
                        if (typeof applyViewerLabel === 'function') applyViewerLabel();
                    } catch (_) { /* may not be initialized yet on very first frame; UI will read on next render */ }
                    // onAuthStateChanged will hide the gate
                    authPasswordInput.value = '';
                    authErrorEl.textContent = '';
                } catch (e) {
                    console.warn('[auth] sign in failed', e);
                    const code = e.code || '';
                    if (code.includes('wrong-password') || code.includes('invalid-credential') || code.includes('invalid-login')) {
                        authErrorEl.textContent = '密码错误，再试一次';
                    } else if (code.includes('too-many-requests')) {
                        authErrorEl.textContent = '尝试太多次，稍后再来';
                    } else if (code.includes('network')) {
                        authErrorEl.textContent = '网络问题，检查连接';
                    } else {
                        authErrorEl.textContent = '验证失败：' + (e.message || code);
                    }
                } finally {
                    authSubmitBtn.disabled = false;
                }
            }
            authSubmitBtn.addEventListener('click', submitAuth);
            authPasswordInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') submitAuth();
            });
            // Listen to auth state — hide gate when signed in, show when signed out
            if (fbAuth) {
                fbAuth.onAuthStateChanged((user) => {
                    if (user && user.uid === SHARED_UID) {
                        hideAuthGate();
                    } else if (user) {
                        // Some other user signed in (shouldn't happen) — sign out and re-show
                        fbAuth.signOut();
                    } else {
                        showAuthGate();
                    }
                });
            } else {
                authErrorEl.textContent = 'Firebase SDK 未加载，请刷新页面';
            }

            const momentsBackend = {
                cached: [],
                subscribers: [],
                ready: false,
                init() {
                    if (!fbAuth || !fbDb) {
                        console.warn('[firebase] SDK not loaded — falling back to localStorage only');
                        return Promise.resolve();
                    }
                    return new Promise(resolve => {
                        let resolved = false;
                        fbAuth.onAuthStateChanged(user => {
                            if (!user) return;
                            fbDb.collection('moments')
                                .orderBy('createdAt', 'desc')
                                .onSnapshot(snap => {
                                    this.cached = snap.docs.map(d => {
                                        const data = d.data();
                                        return {
                                            id: d.id,
                                            author: data.author || 'Eddy',
                                            date: data.date || '',
                                            title: data.title || '',
                                            text: data.text || '',
                                            location: data.location || '',
                                            lat: (typeof data.lat === 'number') ? data.lat : null,
                                            lng: (typeof data.lng === 'number') ? data.lng : null,
                                            photos: data.photos || [],
                                            likes: data.likes || [],
                                            comments: data.comments || [],
                                            createdAt: (data.createdAt && data.createdAt.toMillis) ? data.createdAt.toMillis() : Date.now()
                                        };
                                    });
                                    this.ready = true;
                                    this.subscribers.forEach(cb => { try { cb(this.cached); } catch (e) { console.error(e); } });
                                    if (!resolved) { resolved = true; resolve(); }
                                }, err => {
                                    console.warn('[firebase] snapshot listen failed:', err);
                                    if (!resolved) { resolved = true; resolve(); }
                                });
                        });
                    });
                },
                subscribe(cb) {
                    this.subscribers.push(cb);
                    if (this.ready) cb(this.cached);
                },
                list() { return this.cached.slice(); },
                async add(moment) {
                    if (!fbDb) throw new Error('Firebase 未连接');
                    const doc = {
                        author: moment.author,
                        date: moment.date || '',
                        title: moment.title || '',
                        text: moment.text || '',
                        location: moment.location || '',
                        photos: moment.photos || [],
                        likes: [],
                        comments: [],
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    if (typeof moment.lat === 'number' && typeof moment.lng === 'number') {
                        doc.lat = moment.lat;
                        doc.lng = moment.lng;
                    }
                    await fbDb.collection('moments').add(doc);
                },
                async updateLatLng(id, lat, lng) {
                    if (!fbDb) throw new Error('Firebase 未连接');
                    await fbDb.collection('moments').doc(id).update({ lat, lng });
                },
                async toggleLike(id, who) {
                    if (!fbDb) throw new Error('Firebase 未连接');
                    const ref = fbDb.collection('moments').doc(id);
                    await fbDb.runTransaction(async tx => {
                        const snap = await tx.get(ref);
                        const likes = (snap.data().likes || []).slice();
                        const idx = likes.indexOf(who);
                        if (idx >= 0) likes.splice(idx, 1);
                        else likes.push(who);
                        tx.update(ref, { likes });
                    });
                },
                async addComment(id, who, text) {
                    if (!fbDb) throw new Error('Firebase 未连接');
                    const ref = fbDb.collection('moments').doc(id);
                    await ref.update({
                        comments: firebase.firestore.FieldValue.arrayUnion({ author: who, text, ts: Date.now() })
                    });
                },
                async uploadPhotoBlob(blob, name) {
                    if (!fbStorage) throw new Error('Storage 未连接');
                    const safeName = (name || 'photo.jpg').replace(/[^\w.-]/g, '_');
                    const ref = fbStorage.ref().child(`moments/${Date.now()}_${Math.random().toString(36).slice(2, 6)}_${safeName}`);
                    await ref.put(blob, { contentType: 'image/jpeg' });
                    return await ref.getDownloadURL();
                },
                async deleteMoment(id) {
                    if (!fbDb) throw new Error('Firebase 未连接');
                    const ref = fbDb.collection('moments').doc(id);
                    // Try to delete photos from Storage first (best-effort)
                    try {
                        const snap = await ref.get();
                        const photoUrls = (snap.data() && snap.data().photos) || [];
                        for (const url of photoUrls) {
                            try { await fbStorage.refFromURL(url).delete(); }
                            catch (e) { console.warn('[delete] photo cleanup failed (may already be gone):', e.code || e.message); }
                        }
                    } catch (e) { console.warn('[delete] fetch-before-delete failed:', e); }
                    // Now delete the Firestore document
                    await ref.delete();
                }
            };
            momentsBackend.init();

            // ===== Pings backend (miss-you button) =====
            // Each ping is a tiny doc: { from: 'Eddy'|'Melody', ts: serverTimestamp() }
            // The 24h window of pings is subscribed in real time so banners + toasts update live.
            const pingsBackend = {
                cached: [],        // most-recent first, capped at recent 200
                subscribers: [],
                ready: false,
                init() {
                    if (!fbDb) return;
                    fbAuth.onAuthStateChanged((user) => {
                        if (!user) return;
                        // Subscribe to last 7 days of pings (we'll filter to 24h client-side for the banner)
                        const cutoff = Date.now() - 7 * 24 * 60 * 60 * 1000;
                        fbDb.collection('pings')
                            .orderBy('ts', 'desc')
                            .limit(200)
                            .onSnapshot((snap) => {
                                this.cached = snap.docs.map(d => {
                                    const data = d.data();
                                    return {
                                        id: d.id,
                                        from: data.from,
                                        ts: (data.ts && data.ts.toMillis) ? data.ts.toMillis() : Date.now()
                                    };
                                }).filter(p => p.ts >= cutoff);
                                this.ready = true;
                                this.subscribers.forEach(cb => { try { cb(this.cached); } catch (e) { console.error(e); } });
                            }, err => console.warn('[pings] listen failed', err));
                    });
                },
                subscribe(cb) {
                    this.subscribers.push(cb);
                    if (this.ready) cb(this.cached);
                },
                pingsToday(who) {
                    // Count pings sent by `who` today (since local midnight)
                    const startOfDay = new Date();
                    startOfDay.setHours(0, 0, 0, 0);
                    return this.cached.filter(p => p.from === who && p.ts >= startOfDay.getTime()).length;
                },
                pingsLast24h() {
                    const cutoff = Date.now() - 24 * 60 * 60 * 1000;
                    return this.cached.filter(p => p.ts >= cutoff);
                },
                async add(who) {
                    if (!fbDb) throw new Error('Firebase 未连接');
                    await fbDb.collection('pings').add({
                        from: who,
                        ts: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
            };
            pingsBackend.init();

            // ===== Moods backend (心情温度) =====
            // Schema: `moods` collection, doc id = `{date}_{author}`, fields: { author, date, value, ts }
            // We subscribe to last 30 days. Each user can write/update their OWN doc for today.
            const moodsBackend = {
                cached: [],         // [{ id, author, date, value, ts }]
                subscribers: [],
                ready: false,
                init() {
                    if (!fbDb) return;
                    fbAuth.onAuthStateChanged((user) => {
                        if (!user) return;
                        // Use a 31-day window (string compare on ISO date)
                        const today = new Date();
                        const cutoffDate = new Date(today.getTime() - 31 * 24 * 60 * 60 * 1000);
                        const cutoffIso = cutoffDate.toISOString().slice(0, 10);
                        fbDb.collection('moods')
                            .where('date', '>=', cutoffIso)
                            .onSnapshot((snap) => {
                                this.cached = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                                this.ready = true;
                                this.subscribers.forEach(cb => { try { cb(this.cached); } catch (e) { console.error(e); } });
                            }, err => console.warn('[moods] listen failed', err));
                    });
                },
                subscribe(cb) {
                    this.subscribers.push(cb);
                    if (this.ready) cb(this.cached);
                },
                todayIso() { return new Date().toISOString().slice(0, 10); },
                getToday(who) {
                    const today = this.todayIso();
                    return this.cached.find(m => m.date === today && m.author === who) || null;
                },
                async setMine(value, who) {
                    if (!fbDb) throw new Error('Firebase 未连接');
                    const today = this.todayIso();
                    const docId = `${today}_${who}`;
                    await fbDb.collection('moods').doc(docId).set({
                        author: who,
                        date: today,
                        value: Math.max(0, Math.min(10, Math.round(value))),
                        ts: firebase.firestore.FieldValue.serverTimestamp()
                    });
                },
                // Returns array of {date, eddy, melody} for the last `days` days (oldest first)
                seriesLastDays(days) {
                    const out = [];
                    const today = new Date();
                    for (let i = days - 1; i >= 0; i--) {
                        const d = new Date(today.getTime() - i * 24 * 60 * 60 * 1000);
                        const iso = d.toISOString().slice(0, 10);
                        const eddy = this.cached.find(m => m.date === iso && m.author === 'Eddy');
                        const melody = this.cached.find(m => m.date === iso && m.author === 'Melody');
                        out.push({
                            date: iso,
                            eddy: eddy ? eddy.value : null,
                            melody: melody ? melody.value : null
                        });
                    }
                    return out;
                }
            };

            let LunarLib = null;  // populated lazily

            function activeFestival() {

                    if (f.match.lunarMonth && LunarLib) {

            // ===== "Last year today" helper =====
            // Given moments cache, find one whose `date` is exactly one year ago today
            function recallFromLastYear() {
                if (!momentsBackend.cached || momentsBackend.cached.length === 0) return null;
                const today = new Date();
                const targetYear = today.getFullYear() - 1;
                const targetMonth = today.getMonth() + 1;
                const targetDay = today.getDate();
                const targetDate = `${targetYear}-${String(targetMonth).padStart(2, '0')}-${String(targetDay).padStart(2, '0')}`;

            // ===== Element refs =====
            const canvas = document.getElementById('stage');

            // ===== CONFIG =====
            const CONFIG = {

                themes: [

            // ===== State =====

            const HEART_RADIUS_X = 220;  // approximate elliptical bounding box for hit-test
            const HEART_RADIUS_Y = 200;

            // ===== Helpers =====
            function lerp(a, b, t) { return a + (b - a) * t; }
            function lerpHue(a, b, t) {
                let d = b - a;
                if (d > 180) d -= 360;
                if (d < -180) d += 360;
                return a + d * t;
            }

            // ===== Particle sprite cache (8 color buckets + 1 letter sprite) =====
            // Pre-rendered radial-gradient sprites — replaces per-particle shadowBlur (massive perf win).
            const SPRITE_SIZE = 48;
            const sprites = [];           // colored heart-particle sprites, indexed 0..7
            const letterSprite = (() => { // bright whitish glow used when letters reveal
                const s = document.createElement('canvas');
                s.width = s.height = SPRITE_SIZE;
                const sx = s.getContext('2d');
                const g = sx.createRadialGradient(SPRITE_SIZE / 2, SPRITE_SIZE / 2, 0, SPRITE_SIZE / 2, SPRITE_SIZE / 2, SPRITE_SIZE / 2);
                g.addColorStop(0, 'rgba(255,255,255,1)');
                g.addColorStop(0.3, 'rgba(255,240,245,0.85)');
                g.addColorStop(0.7, 'rgba(255,200,220,0.25)');

            // Snowflake sprite — 6-armed crystal with little branches, used for falling snow.
            const SNOWFLAKE_SIZE = 64;
            const snowflakeSprite = (() => {
                const s = document.createElement('canvas');
                s.width = s.height = SNOWFLAKE_SIZE;
                const sx = s.getContext('2d');
                sx.translate(SNOWFLAKE_SIZE / 2, SNOWFLAKE_SIZE / 2);
                sx.strokeStyle = 'rgba(245, 250, 255, 0.95)';
                sx.lineWidth = 1.6;
                sx.lineCap = 'round';
                const armLen = SNOWFLAKE_SIZE * 0.42;
                const branchOffset = armLen * 0.55;
                const branchLen = armLen * 0.28;
                for (let i = 0; i < 6; i++) {
                    sx.save();
                    sx.rotate((i * Math.PI) / 3);
                    // Main arm
                    sx.beginPath();
                    sx.moveTo(0, 0);
                    sx.lineTo(0, -armLen);
                    sx.stroke();
                    // Small inner branches
                    sx.beginPath();
                    sx.moveTo(0, -branchOffset);
                    sx.lineTo(branchLen, -branchOffset - branchLen * 0.7);
                    sx.moveTo(0, -branchOffset);
                    sx.lineTo(-branchLen, -branchOffset - branchLen * 0.7);
                    sx.stroke();
                    // Outer tip branches (smaller)
                    sx.beginPath();
                    sx.moveTo(0, -armLen * 0.85);
                    sx.lineTo(branchLen * 0.55, -armLen * 0.95);
                    sx.moveTo(0, -armLen * 0.85);
                    sx.lineTo(-branchLen * 0.55, -armLen * 0.95);
                    sx.stroke();
                    sx.restore();

                // Soft central glow
                const cg = sx.createRadialGradient(0, 0, 0, 0, 0, armLen * 0.6);
                cg.addColorStop(0, 'rgba(255, 255, 255, 0.65)');
                cg.addColorStop(0.4, 'rgba(220, 235, 255, 0.15)');
                cg.addColorStop(1, 'rgba(220, 235, 255, 0)');
                sx.fillStyle = cg;
                sx.fillRect(-SNOWFLAKE_SIZE / 2, -SNOWFLAKE_SIZE / 2, SNOWFLAKE_SIZE, SNOWFLAKE_SIZE);
                return s;
            })();

            let lastBakedHueCenter = -999;
            function bakeSprites() {
                const t = state.themeBlend;
                sprites.length = 0;
                for (let i = 0; i < 8; i++) {
                    const r = i / 7;
                    const hue = lerpHue(t.hueCenter, t.hueEdge, r);
                    const light = 65 + r * 8;
                    const s = document.createElement('canvas');
                    s.width = s.height = SPRITE_SIZE;
                    const sx = s.getContext('2d');
                    const g = sx.createRadialGradient(SPRITE_SIZE / 2, SPRITE_SIZE / 2, 0, SPRITE_SIZE / 2, SPRITE_SIZE / 2, SPRITE_SIZE / 2);
                    // Hotter solid core + slower-falling glow halo for visibility under 'lighter' compositing
                    g.addColorStop(0, `hsla(${hue.toFixed(1)}, 95%, ${light + 18}%, 1)`);
                    g.addColorStop(0.18, `hsla(${hue.toFixed(1)}, 92%, ${light + 8}%, 0.95)`);
                    g.addColorStop(0.4, `hsla(${hue.toFixed(1)}, 88%, ${light}%, 0.45)`);
                    g.addColorStop(0.75, `hsla(${hue.toFixed(1)}, 82%, ${light - 5}%, 0.12)`);
                    g.addColorStop(1, `hsla(${hue.toFixed(1)}, 80%, ${light - 10}%, 0)`);
                    sx.fillStyle = g;
                    sx.fillRect(0, 0, SPRITE_SIZE, SPRITE_SIZE);
                    sprites.push(s);
                }
                lastBakedHueCenter = t.hueCenter;

            // ===== Resize — sizes to #wrap so the phone-frame on desktop has its own coord space =====
            const wrapEl = document.getElementById('wrap');
            function resize() {
                const dpr = Math.min(window.devicePixelRatio || 1, 2.5);
                const rect = wrapEl.getBoundingClientRect();
                const w = Math.max(1, Math.round(rect.width));
                const h = Math.max(1, Math.round(rect.height));
                canvas.width = w * dpr;
                canvas.height = h * dpr;

                ctx.setTransform(1, 0, 0, 1, 0, 0);

            }
            window.addEventListener('resize', resize);
            // Keep the draw-board canvas crisp across window resizes / device-rotation.
            // Debounced so we don't thrash mid-drag.
            let drawResizeTimer = null;
            window.addEventListener('resize', () => {
                if (!drawState.wired) return;

                drawResizeTimer = setTimeout(() => {

            // Helper: convert a client (window) coord to canvas-local coord
            function clientToCanvas(clientX, clientY) {
                const r = canvas.getBoundingClientRect();
                return { x: clientX - r.left, y: clientY - r.top, inside: clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom };
            }

            // ===== Letter point sampling (offscreen canvas → opaque pixels) =====
            function sampleLetterPoints(text, count) {
                const W = 200, H = 120;
                const off = document.createElement('canvas');
                off.width = W; off.height = H;
                const ox = off.getContext('2d');
                ox.fillStyle = '#fff';
                ox.font = 'bold 110px serif';
                ox.textAlign = 'center';
                ox.textBaseline = 'middle';
                ox.fillText(text, W / 2, H / 2);
                const data = ox.getImageData(0, 0, W, H).data;
                const pts = [];
                for (let y = 0; y < H; y += 2) {
                    for (let x = 0; x < W; x += 2) {
                        if (data[(y * W + x) * 4 + 3] > 128) {
                            pts.push({ x: x - W / 2, y: y - H / 2 });
                        }
                    }
                }
                const out = [];
                for (let i = 0; i < count && pts.length > 0; i++) {
                    out.push(pts[Math.floor(Math.random() * pts.length)]);
                }
                return out;
            }

            // ===== 3D Heart points (extruded 2D heart) =====
            function generateHeartPoints() {
                const points = [];
                let made = 0;
                while (made < CONFIG.particleCount) {
                    const t = Math.random() * Math.PI * 2;
                    const r = Math.pow(Math.random(), 0.5);
                    const hx = 16 * Math.pow(Math.sin(t), 3);
                    const hy = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                    const px = hx * r;
                    const py = hy * r;
                    // Thin the narrow central column at both poles to avoid 'lighter'-mode hot spots:
                    //   • bottom tail (narrow, just trim the very axis)
                    //   • top notch (a bit wider — that's where 'lighter' was over-blowing)
                    const absHx = Math.abs(px);
                    if (absHx < 1.2 && hy > 10 && Math.random() < 0.55) continue;
                    if (absHx < 2.2 && hy < -3 && hy > -8 && Math.random() < 0.7) continue;
                    const depth = 5.5 * Math.sqrt(Math.max(0, 1 - r));
                    const z = (Math.random() * 2 - 1) * depth;
                    const jitterX = (Math.random() - 0.5) * 5;
                    const jitterY = (Math.random() - 0.5) * 3;
                    points.push({
                        x: px * 14 + jitterX,
                        y: py * 13 + jitterY,
                        z: z * 12,
                        r,
                        colorIdx: Math.min(7, Math.floor(r * 8)),
                        isLetter: false,
                        letterX: 0,
                        letterY: 0,
                        // Phase 4 interaction fields
                        burstX: 0,      // outward radial offset from tap, decays each frame
                        burstY: 0,
                        morphX: 0,      // text-target screen coordinate for "Melody" morph
                        morphY: 0
                    });
                    made++;
                }
                // Mark ~200 particles as letter particles, M on left and E on right
                const mPts = sampleLetterPoints('M', 110);
                const ePts = sampleLetterPoints('E', 110);
                const shuffled = points.slice().sort(() => Math.random() - 0.5);
                const sLetter = 1.4;
                for (let i = 0; i < mPts.length && i < shuffled.length; i++) {
                    const p = shuffled[i];
                    p.isLetter = true;
                    p.letterX = mPts[i].x * sLetter - 110;
                    p.letterY = mPts[i].y * sLetter - 10;
                }
                for (let i = 0; i < ePts.length && (i + mPts.length) < shuffled.length; i++) {
                    const p = shuffled[i + mPts.length];
                    p.isLetter = true;
                    p.letterX = ePts[i].x * sLetter + 110;
                    p.letterY = ePts[i].y * sLetter - 10;
                }
                return points;
            }

            // ===== Snowflakes (falling crystals) =====
            function initPetals() {
                state.petals = [];
                for (let i = 0; i < CONFIG.petalCount; i++) {
                    state.petals.push({
                        x: Math.random() * state.w,
                        y: Math.random() * state.h - state.h * 0.5,
                        speed: Math.random() * 1.0 + 0.4,
                        size: Math.random() * 12 + 10,
                        rotation: Math.random() * Math.PI * 2,
                        rotationSpeed: (Math.random() - 0.5) * 0.8,
                        opacity: Math.random() * 0.45 + 0.5,
                        swayPhase: Math.random() * Math.PI * 2
                    });
                }
            }

            // ===== Heart hit-test + interactions =====
            function heartCenter() {
                return { cx: state.w / 2, cy: state.h / 2 - 30 };
            }
            function isInsideHeart(x, y) {
                const { cx, cy } = heartCenter();
                const dx = (x - cx) / HEART_RADIUS_X;
                const dy = (y - cy) / HEART_RADIUS_Y;
                return dx * dx + dy * dy < 1;
            }
            // Tracks the last time a heart-tap ping was recorded (cooldown to prevent spam from
            // rapid visual taps; the ripple/burst animation still fires every tap, only the
            // ping write is throttled).
            let lastMissPingTime = 0;
            const MISS_PING_COOLDOWN_MS = 1500;

            function triggerHeartTap(x, y) {
                // Expanding ripple
                state.ripples.push({ x, y, radius: 8, alpha: 0.9 });
                // Quick beat acceleration (~800ms)
                state.beatBoost = 1;
                // Outward radial burst on every particle, originating from tap point in heart-local coords
                const { cx, cy } = heartCenter();
                const tapLocalX = x - cx;
                const tapLocalY = y - cy;
                for (let i = 0; i < state.heartPoints.length; i++) {
                    const p = state.heartPoints[i];
                    let dx = p.x - tapLocalX;
                    let dy = p.y - tapLocalY;
                    const len = Math.sqrt(dx * dx + dy * dy) || 1;
                    // Particles farther from tap get smaller kick
                    const falloff = Math.max(0, 1 - len / 280);
                    const kick = 18 * falloff + 4;
                    p.burstX += (dx / len) * kick;
                    p.burstY += (dy / len) * kick;
                }

                // ===== Record a "miss-you" ping (with cooldown) =====
                const now = Date.now();
                if (now - lastMissPingTime < MISS_PING_COOLDOWN_MS) return;
                lastMissPingTime = now;

                const toast = document.getElementById('miss-toast');
                if (toast) {
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 1400);
                }
                if (typeof currentViewer !== 'undefined' && pingsBackend) {
                    pingsBackend.add(currentViewer).catch(err => {
                        console.warn('[miss] ping failed', err);
                        if (toast) toast.textContent = '发送失败，稍后重试…';
                        setTimeout(() => { if (toast) toast.textContent = '想你了，已送达 ❤'; }, 2000);
                    });
                }
            }
            // ===== "Melody" text morph =====
            function sampleTextPoints(text, count, fontSpec) {
                const W = 720, H = 220;
                const off = document.createElement('canvas');
                off.width = W; off.height = H;
                const ox = off.getContext('2d');
                ox.fillStyle = '#fff';
                ox.font = fontSpec;
                ox.textAlign = 'center';
                ox.textBaseline = 'middle';
                ox.fillText(text, W / 2, H / 2);
                const data = ox.getImageData(0, 0, W, H).data;
                const pts = [];
                for (let y = 0; y < H; y += 2) {
                    for (let x = 0; x < W; x += 2) {
                        if (data[(y * W + x) * 4 + 3] > 128) {
                            pts.push({ x: x - W / 2, y: y - H / 2 });
                        }
                    }
                }
                if (pts.length === 0) return [];
                const out = [];
                for (let i = 0; i < count; i++) {
                    out.push(pts[Math.floor(Math.random() * pts.length)]);
                }
                return out;
            }
            function prepareMorphTargets() {
                // Sampled in screen-local heart coordinates (offset added in render)
                const pts = sampleTextPoints('Melody', state.heartPoints.length, 'italic bold 140px "Long Cang", cursive, serif');
                if (pts.length === 0) return false;
                for (let i = 0; i < state.heartPoints.length; i++) {
                    state.heartPoints[i].morphX = pts[i].x;
                    state.heartPoints[i].morphY = pts[i].y;
                }
                state.morph.hasTargets = true;
                return true;
            }
            function triggerMorph() {
                if (!state.morph.hasTargets && !prepareMorphTargets()) return;
                state.morph.phase = 'forward';
                state.morph.progress = 0;
            }

            // ===== Trail mini-hearts (cursor / touch) =====
            function spawnTrailHeart(x, y) {
                if (state.trailHearts.length > 40) state.trailHearts.shift();
                state.trailHearts.push({
                    x, y,
                    scale: 0.18 + Math.random() * 0.18,
                    life: 1.0,
                    vx: (Math.random() - 0.5) * 0.6,
                    vy: -0.4 - Math.random() * 0.5,
                    hue: state.themeBlend.hueEdge + (Math.random() - 0.5) * 25

            // ===== Fireworks (streaks + heart tips) =====
            const FIREWORK_PALETTE = ['#FFD700', '#FF7AA5', '#FFC4D8', '#FFFFFF', '#FFE0AC', '#FF69B4', '#FFB347'];
            const FIREWORK_TRAIL_LEN = 14;
            function spawnFirework(x, y) {
                const count = 28;
                const group = [];
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const v = Math.random() * 3 + 3.5;
                    group.push({
                        x, y,
                        vx: Math.cos(angle) * v,
                        vy: Math.sin(angle) * v,
                        life: 1.0,
                        decay: Math.random() * 0.012 + 0.012,
                        color: FIREWORK_PALETTE[Math.floor(Math.random() * FIREWORK_PALETTE.length)],
                        trail: [{ x, y }]
                    });
                }
                state.fireworks.push(group);
            }

            // ===== Audio fade-in + mute =====

                        const timer = setInterval(() => {
                            vol += 0.05;
                            if (vol >= 1) { vol = 1; clearInterval(timer); }
                            audio.volume = vol;
                        }, 200);
                    }).catch(() => { /* autoplay blocked — mute button still works */ });
                }
            }
            window.addEventListener('click', playAudio);
            window.addEventListener('touchstart', playAudio);

            const ICON_SOUND_ON =

            const momentsMuteBtn = document.getElementById('moments-mute');

            // ===== Mouse / touch =====
            function handleTap(x, y) {
                const now = performance.now();
                const isDouble = (now - state.lastTapTime) < 320;

                const insideHeart = isInsideHeart(x, y);
                if (isDouble && insideHeart) {

            // ===== Moments / 瞬间 (Firebase via momentsBackend) =====

            function buildMoodChartSvg(series) {
                const W = 220, H = 80, P = 4;
                const innerW = W - 2 * P;
                const innerH = H - 2 * P;
                const xStep = innerW / Math.max(1, series.length - 1);
                const yFor = v => P + innerH * (1 - v / 10);
                const polyFor = (key, color) => {
                    const pts = [];
                    for (let i = 0; i < series.length; i++) {
                        const v = series[i][key];
                        if (v === null) continue;
                        pts.push(`${(P + i * xStep).toFixed(1)},${yFor(v).toFixed(1)}`);
                    }
                    if (pts.length === 0) return '';
                    return `<polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>`;
                };
                // baseline
                const baseLines = `<line x1="${P}" y1="${P}" x2="${P}" y2="${H - P}" stroke="rgba(255,255,255,0.08)"/>
                                   <line x1="${P}" y1="${H - P}" x2="${W - P}" y2="${H - P}" stroke="rgba(255,255,255,0.08)"/>`;

                    ${polyFor('melody', '#ff6f9a')}
