                const valEl = e.target.parentElement.querySelector('.mood-block-value');
                if (valEl) {
                    valEl.textContent = moodValueText(parseInt(e.target.value, 10));
                    valEl.classList.remove('empty');
                }
            });

            // Re-render right sidebar when mood data changes
            moodsBackend.subscribe(() => {
                if (momentsOverlay.classList.contains('open')) renderMoodPanel();
            });

            function buildRecallCard() {
                const recall = recallFromLastYear();
                if (!recall) return '';
                const author = escapeHtml(recall.author);
                const title = recall.title ? `「${escapeHtml(recall.title)}」` : '';
                const snippet = recall.text ? escapeHtml(recall.text) : (recall.location ? '📍' + escapeHtml(recall.location) : '');
                const firstPhoto = (recall.photos && recall.photos[0]) || '';
                const thumb = firstPhoto && !firstPhoto.startsWith('placeholder')
                    ? `<div class="recall-card-thumb"><img src="${escapeHtml(firstPhoto)}" alt=""/></div>`
                    : `<div class="recall-card-thumb"></div>`;
                return `
                    <div class="recall-card" data-recall-id="${escapeHtml(recall.id)}">
                        ${thumb}
                        <div style="flex:1;min-width:0">
                            <div class="recall-card-tag">🌸 一年前的今天 · ${author}</div>
                            <div class="recall-card-title">${title || '（无标题）'}</div>
                            ${snippet ? `<div class="recall-card-snippet">${snippet}</div>` : ''}
                        </div>
                    </div>`;
            }

            // ===== Monthly / yearly review =====
            // Shows a banner above the feed near month-end (28th-31st) or month-start (1st-3rd).
            // Click → modal with stats + 6 random photos + most-liked post for that period.

            function reviewWindow() {
                // Returns { kind: 'month'|'year'|null, year, month, label }
                const now = new Date();
                const day = now.getDate();
                const m = now.getMonth() + 1;   // 1-12
                const y = now.getFullYear();
                // Year review around Jan 1-7 or Dec 26-31
                if ((m === 1 && day <= 7) || (m === 12 && day >= 26)) {
                    const targetY = (m === 1) ? y - 1 : y;
                    return { kind: 'year', year: targetY, month: null, label: `${targetY} 年精选` };
                }
                // Month review around the 28th-31st or 1st-3rd
                if (day >= 28 || day <= 3) {
                    let targetM = day <= 3 ? m - 1 : m;
                    let targetY = y;
                    if (targetM === 0) { targetM = 12; targetY = y - 1; }
                    return { kind: 'month', year: targetY, month: targetM, label: `${targetY} 年 ${targetM} 月精选` };
                }
                return { kind: null };
            }

            function buildReviewBanner() {
                const w = reviewWindow();
                if (!w.kind) return '';
                return `
                    <div class="review-banner" id="review-banner">
                        <span class="sparkle">✨</span>
                        <div class="review-banner-text"><b>${escapeHtml(w.label)}</b> 已经生成</div>
                        <span class="review-banner-cta">点击查看 →</span>
                    </div>`;
            }

            function momentsInPeriod(kind, year, month) {
                const all = momentsBackend.cached || [];
                return all.filter(mm => {
                    if (!mm.date) return false;
                    const [yy, mo] = mm.date.split('-').map(s => parseInt(s, 10));
                    if (kind === 'year') return yy === year;
                    if (kind === 'month') return yy === year && mo === month;
                    return false;
                });
            }

            function pingsInPeriod(kind, year, month) {
                const all = pingsBackend.cached || [];
                return all.filter(p => {
                    const d = new Date(p.ts);
                    if (kind === 'year') return d.getFullYear() === year;
                    if (kind === 'month') return d.getFullYear() === year && (d.getMonth() + 1) === month;
                    return false;
                });
            }

            function openReviewModal() {
                const w = reviewWindow();
                if (!w.kind) return;
                const ms = momentsInPeriod(w.kind, w.year, w.month);
                const ps = pingsInPeriod(w.kind, w.year, w.month);

                // Aggregate stats
                const totalLikes = ms.reduce((acc, m) => acc + (m.likes ? m.likes.length : 0), 0);
                const totalComments = ms.reduce((acc, m) => acc + (m.comments ? m.comments.length : 0), 0);

                // Top post: most likes + comments combined
                let top = null;
                let topScore = -1;
                for (const m of ms) {
                    const score = (m.likes ? m.likes.length : 0) * 2 + (m.comments ? m.comments.length : 0);
                    if (score > topScore) { topScore = score; top = m; }
                }
                const topAvatar = top && top.author === 'Melody' ? AVATAR_SVG_MELODY : AVATAR_SVG_EDDY;
                const topThumb = (top && top.photos && top.photos[0]) ? `<img src="${escapeHtml(top.photos[0])}" alt=""/>` : '';
                const topHtml = top ? `
                    <div class="review-top-card">
                        <div class="top-thumb">${topThumb}</div>
                        <div class="top-info">
                            <div class="top-author">${escapeHtml(top.author)}</div>
                            <div class="top-title">${escapeHtml(top.title || '（无标题）')}</div>
                            <div class="top-stats">❤ ${(top.likes || []).length}   💬 ${(top.comments || []).length}</div>
                        </div>
                    </div>` : '<div style="color:rgba(255,255,255,0.5);font-size:13px;text-align:center;padding:8px 0">本期没有动态…</div>';

                // 6 random photo URLs from the period
                const allPhotos = ms.flatMap(m => (m.photos || []).filter(p => p && !p.startsWith('placeholder')));
                const shuffled = allPhotos.slice().sort(() => Math.random() - 0.5).slice(0, 6);
                const photoGrid = shuffled.length > 0
                    ? `<div class="review-photos">${shuffled.map(p => `<div class="review-photo"><img src="${escapeHtml(p)}" alt=""/></div>`).join('')}</div>`
                    : '<div style="color:rgba(255,255,255,0.4);font-size:13px;text-align:center;padding:14px 0">本期没有照片</div>';

                const modal = document.getElementById('review-modal');
                modal.innerHTML = `
                    <div class="review-card">
                        <h3 class="review-card-title">${escapeHtml(w.label)}</h3>
                        <div class="review-card-sub">你和 Melody · 一段被云端记住的小日子 ❤</div>
                        <div class="review-stats">
                            <div class="review-stat"><div class="review-stat-num">${ms.length}</div><div class="review-stat-label">动态</div></div>
                            <div class="review-stat"><div class="review-stat-num">${totalLikes}</div><div class="review-stat-label">点赞</div></div>
                            <div class="review-stat"><div class="review-stat-num">${totalComments}</div><div class="review-stat-label">留言</div></div>
                            <div class="review-stat"><div class="review-stat-num">${ps.length}</div><div class="review-stat-label">想念</div></div>
                        </div>
                        <div class="review-section-title">🏆 最热的一条</div>
                        ${topHtml}
                        <div class="review-section-title">📸 ${shuffled.length} 张随机回忆</div>
                        ${photoGrid}
                        <button type="button" class="review-close" id="review-close-btn">关上 ❤</button>
                    </div>`;
                modal.classList.add('open');
            }

            function closeReviewModal() {
                const modal = document.getElementById('review-modal');
                modal.classList.remove('open');
            }

            // Bind: click banner → open modal; click outside or × button → close
            document.addEventListener('click', (e) => {
                if (e.target.closest('#review-banner')) {
                    openReviewModal();
                    return;
                }
                if (e.target.closest('#review-close-btn')) {
                    closeReviewModal();
                    return;
                }
                if (e.target.id === 'review-modal') {
                    closeReviewModal();
                }
            });

            // Persistent search query across renders (Firestore live updates re-render too)
            let momentsSearchQuery = '';
            function matchesMomentSearch(m, q) {
                if (!q) return true;
                const hay = `${m.title || ''} ${m.text || ''} ${m.location || ''} ${m.author || ''} ${m.date || ''}`.toLowerCase();
                return hay.includes(q);
            }
            function renderMomentsFeed() {
                renderSidebar();
                const pane = document.getElementById('feed-pane-moments');
                if (!pane) return;
                const all = loadMoments().map(normalizeMoment).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                const q = (momentsSearchQuery || '').trim().toLowerCase();
                const moments = q ? all.filter(m => matchesMomentSearch(m, q)) : all;
                const hasTextCls = q ? ' has-text' : '';
                const searchRow = `
                    <div class="moments-search-row${hasTextCls}">
                        <span class="search-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
                        </span>
                        <input type="text" id="moments-search-input" placeholder="搜文字、地点、日期、作者…" value="${escapeHtml(momentsSearchQuery)}" autocomplete="off">
                        <button type="button" class="search-clear" id="moments-search-clear" aria-label="清空">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
                        </button>
                    </div>
                `;
                // Hide review/recall banners when actively searching (keep search results clean)
                const topExtras = q ? '' : buildReviewBanner() + buildRecallCard();
                if (all.length === 0) {
                    pane.innerHTML = searchRow + topExtras + '<div class="moment-empty">还没有故事，点右下角 + 发表第一条吧 ❤</div>';
                    return;
                }
                if (moments.length === 0) {
                    pane.innerHTML = searchRow + `<div class="search-empty">没有找到包含「${escapeHtml(momentsSearchQuery)}」的瞬间</div>`;
                    return;
                }
                pane.innerHTML = searchRow + topExtras + moments.map(m => {
                    const avatar = m.author === 'Melody' ? AVATAR_SVG_MELODY : AVATAR_SVG_EDDY;
                    const avatarClass = m.author === 'Melody' ? 'moment-avatar melody' : 'moment-avatar';
                    const photos = (m.photos || []);
                    let photosCls = '';
                    if (photos.length === 1) photosCls = 'single';
                    else if (photos.length === 2) photosCls = 'double';
                    const photosHtml = photos.length === 0 ? '' :
                        `<div class="moment-photos ${photosCls}">${photos.map(p =>
                            `<div class="moment-photo${p.startsWith('placeholder') ? ' placeholder' : ''}" data-photo="${escapeHtml(p)}">${p.startsWith('placeholder') ? '' : `<img src="${escapeHtml(p)}" alt="" />`}</div>`
                        ).join('')}</div>`;
                    const title = m.title ? `<div class="moment-title">${escapeHtml(m.title)}</div>` : '';
                    const text = m.text ? `<div class="moment-text">${escapeHtml(m.text)}</div>` : '';
                    const locationHtml = m.location ? `<div class="moment-location">${escapeHtml(m.location)}</div>` : '';
                    const liked = m.likes.includes(currentViewer);
                    const heartIcon = liked
                        ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="#ff6f9a"><path d="M12 21s-7-4.35-9.5-9.05C.93 9.16 2.4 5 6.2 5c2.1 0 3.5 1.2 4.3 2.4l1.5 2.05 1.5-2.05C14.3 6.2 15.7 5 17.8 5c3.8 0 5.27 4.16 3.7 6.95C19 16.65 12 21 12 21z"/></svg>'
                        : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M12 21s-7-4.35-9.5-9.05C.93 9.16 2.4 5 6.2 5c2.1 0 3.5 1.2 4.3 2.4l1.5 2.05 1.5-2.05C14.3 6.2 15.7 5 17.8 5c3.8 0 5.27 4.16 3.7 6.95C19 16.65 12 21 12 21z"/></svg>';
                    const commentIcon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>';
                    const trashIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6M10 11v6M14 11v6"/></svg>';
                    const likersText = m.likes.length > 0
                        ? `<div class="comment-likers">❤ ${m.likes.map(escapeHtml).join('、')}</div>`
                        : '';
                    const commentsHtml = m.comments.map(c =>
                        `<div class="comment-item"><span class="who">${escapeHtml(c.author)}：</span>${escapeHtml(c.text)}</div>`
                    ).join('');
                    const openCls = openCommentIds.has(m.id) ? ' open' : '';
                    return `
                        <div class="moment-card" data-id="${escapeHtml(m.id)}">
                            <div class="${avatarClass}">${avatar}</div>
                            <div class="moment-body">
                                <div class="moment-author">${escapeHtml(m.author)}</div>
                                ${title}
                                ${text}
                                ${photosHtml}
                                ${locationHtml}
                                <div class="moment-meta">${formatDate(m.date)}</div>
                                <div class="moment-actions">
                                    <button class="moment-action ${liked ? 'liked' : ''}" data-act="like" data-id="${escapeHtml(m.id)}">${heartIcon}<span>${m.likes.length || ''}</span></button>
                                    <button class="moment-action" data-act="toggle-comments" data-id="${escapeHtml(m.id)}">${commentIcon}<span>${m.comments.length || ''}</span></button>
                                    <button class="moment-action danger" data-act="delete" data-id="${escapeHtml(m.id)}" aria-label="删除">${trashIcon}</button>
                                </div>
                                <div class="comments-block${openCls}" data-comments="${escapeHtml(m.id)}">
                                    ${likersText}
                                    <div class="comments-list">${commentsHtml || '<div style="opacity:0.5;font-size:13px">还没有评论…</div>'}</div>
                                    <div class="comment-input-row">
                                        <input type="text" placeholder="作为 ${escapeHtml(currentViewer)} 留言…" maxlength="200" data-comment-input="${escapeHtml(m.id)}">
                                        <button data-act="add-comment" data-id="${escapeHtml(m.id)}">发送</button>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                }).join('');
            }

            // Subscribe to live updates — re-render whenever Firestore changes
            momentsBackend.subscribe(() => {
                if (momentsOverlay.classList.contains('open')) renderMomentsFeed();
            });
            // Re-render the feed when new pings arrive (banner counts update live)
            pingsBackend.subscribe(() => {
                if (momentsOverlay.classList.contains('open')) renderMomentsFeed();
            });

            // ===== Wishlist render + tab switching =====
            const WISH_TINY_EDDY = '<svg viewBox="0 0 40 40"><circle cx="20" cy="16" r="9" fill="#ffe0c2"/><path d="M11 13c0-5 4-8 9-8s9 3 9 8c0 0-2 1-9 1s-9-1-9-1z" fill="#3a2018"/><path d="M14 30l-2 6h16l-2-6c-1-1-4-2-6-2s-5 1-6 2z" fill="#5d4f8a"/></svg>';
            const WISH_TINY_MELODY = '<svg viewBox="0 0 40 40"><path d="M9 25c0-3 1-8 2-11 1-3 4-5 9-5s8 2 9 5c1 3 2 8 2 11l-2 2c0 0-1-6-2-7l-1 4-1-5-2 4-1-5-2 4-1-5-2 4-1-4c-1 1-2 7-2 7z" fill="#5b2e2e"/><circle cx="20" cy="17" r="9" fill="#ffe0c2"/><path d="M14 30l-2 6h16l-2-6c-1-1-4-2-6-2s-5 1-6 2z" fill="#ff8fc1"/></svg>';

            function renderWishes() {
                const pane = document.getElementById('feed-pane-wishes');
                if (!pane) return;
                const wishes = wishesBackend.cached.slice();
                // Pending first (newest at top), then done (newest done first)
                const pending = wishes.filter(w => !w.done).sort((a, b) => b.addedAt - a.addedAt);
                const done = wishes.filter(w => w.done).sort((a, b) => (b.doneAt || 0) - (a.doneAt || 0));

                const renderItem = (w) => {
                    const avatar = w.addedBy === 'Melody' ? WISH_TINY_MELODY : WISH_TINY_EDDY;
                    const dt = new Date(w.addedAt);
                    const dateStr = `${dt.getFullYear()}/${dt.getMonth() + 1}/${dt.getDate()}`;
                    return `
                        <div class="wish-item ${w.done ? 'done' : ''}" data-id="${escapeHtml(w.id)}">
                            <button class="wish-checkbox" data-act="wish-toggle" data-id="${escapeHtml(w.id)}" aria-label="${w.done ? '取消完成' : '标记完成'}">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                            </button>
                            <div class="wish-body">
                                <div class="wish-text">${escapeHtml(w.text)}</div>
                                <div class="wish-meta">
                                    <span class="wish-meta-avatar">${avatar}</span>
                                    <span>${escapeHtml(w.addedBy)}</span>
                                    <span>· ${dateStr}</span>
                                    ${w.done && w.doneBy ? `<span>· ${escapeHtml(w.doneBy)} 完成 ✿</span>` : ''}
                                </div>
                            </div>
                            <button class="wish-delete" data-act="wish-delete" data-id="${escapeHtml(w.id)}" aria-label="删除">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
                            </button>
                        </div>`;
                };

                const inputRow = `
                    <div class="wish-add-row">
                        <input type="text" id="wish-input" placeholder="想一起做什么…" maxlength="80" autocomplete="off">
                        <button type="button" id="wish-add-btn">添加 ❤</button>
                    </div>`;

                let body = inputRow;
                if (pending.length === 0 && done.length === 0) {
                    body += '<div class="wish-empty">还没有心愿…<br/>写下你和 ' + (currentViewer === 'Eddy' ? 'Melody' : 'Eddy') + ' 想一起做的事吧 ✿</div>';
                } else {
                    if (pending.length > 0) {
                        body += `<div class="wish-section-title">想做的（${pending.length}）</div>`;
                        body += pending.map(renderItem).join('');
                    }
                    if (done.length > 0) {
                        body += `<div class="wish-section-title">已完成（${done.length}） ✿</div>`;
                        body += done.map(renderItem).join('');
                    }
                }
                pane.innerHTML = body;
            }

            // ===== Songs render + Bilibili mini player =====
            // miniPlayer holds the currently-loaded queue + index. The queue is just
            // a snapshot of the songs list at "play" time; subsequent inserts/deletes
            // by either user don't disrupt what's currently playing.
            // Loop-mode icons. Three states cycle on click: off → list → one → off
            const LOOP_ICON_OFF  = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/><line x1="3" y1="3" x2="21" y2="21"/></svg>';
            const LOOP_ICON_LIST = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>';
            const LOOP_ICON_ONE  = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/><text x="9" y="16" font-size="9" fill="currentColor" stroke="none" font-weight="bold">1</text></svg>';

            const miniPlayer = {
                el: null, iframe: null, titleEl: null, subEl: null,
                prevBtn: null, nextBtn: null, closeBtn: null, loopBtn: null,
                queue: [],         // array of {id, bvid, title, addedBy}
                index: -1,         // current position
                loopMode: localStorage.getItem('pourMelodyLoopMode') || 'list',  // 'off' | 'list' | 'one'
                get currentSongId() { return this.index >= 0 && this.queue[this.index] ? this.queue[this.index].id : null; },

                init() {
                    this.el       = document.getElementById('mini-player');
                    this.iframe   = document.getElementById('mini-player-iframe');
                    this.titleEl  = document.getElementById('mini-player-title');
                    this.subEl    = document.getElementById('mini-player-sub');
                    this.prevBtn  = document.getElementById('mini-player-prev');
                    this.nextBtn  = document.getElementById('mini-player-next');
                    this.closeBtn = document.getElementById('mini-player-close');
                    this.loopBtn  = document.getElementById('mini-player-loop');
                    this.prevBtn.addEventListener('click', () => this.prev());
                    this.nextBtn.addEventListener('click', () => this.next());
                    this.closeBtn.addEventListener('click', () => this.close());
                    this.loopBtn.addEventListener('click', () => this.cycleLoopMode());
                    this._updateLoopBtn();

                    // Listen for postMessage events from the Bilibili iframe. Bilibili's
                    // embed player isn't documented for cross-origin events but some builds
                    // do post `{type:'ended'}` or `{event:'video_end'}`-style payloads.
                    // We accept anything that looks like an "end" signal and act on it.
                    window.addEventListener('message', (ev) => {
                        // Only trust messages whose source is our iframe
                        if (!this.iframe || ev.source !== this.iframe.contentWindow) return;
                        const d = ev.data;
                        if (!d) return;
                        const str = (typeof d === 'string') ? d : JSON.stringify(d);
                        if (/end|ended|finish|complete|stop/i.test(str)) {
                            this._handleSongEnd();
                        }
                    });
                },

                cycleLoopMode() {
                    const order = ['off', 'list', 'one'];
                    const idx = order.indexOf(this.loopMode);
                    this.loopMode = order[(idx + 1) % order.length];
                    localStorage.setItem('pourMelodyLoopMode', this.loopMode);
                    this._updateLoopBtn();
                    this._showLoopToast();
                },
                _updateLoopBtn() {
                    if (!this.loopBtn) return;
                    if (this.loopMode === 'off')  { this.loopBtn.innerHTML = LOOP_ICON_OFF;  this.loopBtn.style.color = 'rgba(255,255,255,0.45)'; }
                    if (this.loopMode === 'list') { this.loopBtn.innerHTML = LOOP_ICON_LIST; this.loopBtn.style.color = '#ff9fc0'; }
                    if (this.loopMode === 'one')  { this.loopBtn.innerHTML = LOOP_ICON_ONE;  this.loopBtn.style.color = '#ff9fc0'; }
                },
                _showLoopToast() {
                    const labels = { off: '关闭循环', list: '列表循环', one: '单曲循环' };
                    if (this.subEl) {
                        const orig = this.subEl.textContent;
                        this.subEl.textContent = labels[this.loopMode];
                        clearTimeout(this._loopToastTimer);
                        this._loopToastTimer = setTimeout(() => {
                            if (this.queue[this.index]) {
                                this.subEl.textContent = `${this.queue[this.index].addedBy || '?'} 加入 · ${this.index + 1}/${this.queue.length}`;
                            } else {
                                this.subEl.textContent = orig;
                            }
                        }, 1500);
                    }
                },
                _handleSongEnd() {
                    // Called when we detect the current B站 video ended (best-effort).
                    if (this.loopMode === 'one') {
                        this._load();  // reload same bvid
                    } else if (this.loopMode === 'list') {
                        if (this.queue.length === 0) return;
                        this.index = (this.index + 1) % this.queue.length;
                        this._load();
                    } else {
                        // off — do nothing, let it sit
                    }
                },

                play(songsList, startId) {
                    this.queue = songsList.slice();
                    const i = startId ? this.queue.findIndex(s => s.id === startId) : 0;
                    this.index = i >= 0 ? i : 0;
                    this._load();
                    this._open();
                    if (typeof setMuted === 'function' && !isMuted) setMuted(true);
                },
                _load() {
                    const cur = this.queue[this.index];
                    if (!cur) return this.close();
                    // Bilibili embed URL — autoplay=1 starts immediately, danmaku=0 hides
                    // comments, high_quality=1 picks better stream when available.
                    const src = `https://player.bilibili.com/player.html?bvid=${encodeURIComponent(cur.bvid)}&autoplay=1&danmaku=0&high_quality=1`;
                    this.iframe.src = src;
                    this.titleEl.textContent = cur.title || cur.bvid;
                    this.subEl.textContent = `${cur.addedBy || '?'} 加入 · ${this.index + 1}/${this.queue.length}`;
                    // With list-loop on, prev/next wrap around — never disable
                    const wrap = this.loopMode === 'list';
                    this.prevBtn.disabled = !wrap && this.index <= 0;
                    this.nextBtn.disabled = !wrap && this.index >= this.queue.length - 1;
                    if (activeFeedTab === 'songs') renderSongs();
                },
                prev() {
                    if (this.queue.length === 0) return;
                    if (this.index > 0) { this.index--; }
                    else if (this.loopMode === 'list') { this.index = this.queue.length - 1; }
                    else return;
                    this._load();
                },
                next() {
                    if (this.queue.length === 0) return;
                    if (this.index < this.queue.length - 1) { this.index++; }
                    else if (this.loopMode === 'list') { this.index = 0; }
                    else return;
                    this._load();
                },
                _open() {
                    this.el.classList.add('open');
                    this.el.setAttribute('aria-hidden', 'false');
                },
                close() {
                    this.el.classList.remove('open');
                    this.el.setAttribute('aria-hidden', 'true');
                    this.iframe.src = 'about:blank';
                    this.index = -1;
                    this.queue = [];
                    if (activeFeedTab === 'songs') renderSongs();
                }
            };

            function renderSongs() {
                const pane = document.getElementById('feed-pane-songs');
                if (!pane) return;
                const songs = songsBackend.cached.slice();

                let html = `
                    <div class="song-add-row">
                        <input id="song-input" type="text" placeholder="粘贴 Bilibili 链接或 BV 号…" autocomplete="off">
                    </div>
                    <div class="song-add-row">
                        <input id="song-title-input" type="text" placeholder="歌名（必填，自己起也行）" autocomplete="off" maxlength="80">
                        <button type="button" id="song-add-btn">加入 ♪</button>
                    </div>
                    <div class="song-hint">
                        粘贴 B 站视频链接（手机：分享 → 复制链接；电脑：地址栏复制），
                        起个歌名（B 站不让我们自动抓标题）。
                    </div>
                `;

                if (!songsBackend.ready) {
                    html += '<div class="song-empty">读取中…</div>';
                } else if (songs.length === 0) {
                    html += '<div class="song-empty">还没有歌呢…<br/>放一首属于你们的吧 ♪</div>';
                } else {
                    for (const s of songs) {
                        const av = s.addedBy === 'Melody' ? WISH_TINY_MELODY : WISH_TINY_EDDY;
                        const playingCls = miniPlayer.currentSongId === s.id ? ' playing' : '';
                        const playIcon = miniPlayer.currentSongId === s.id
                            ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>'
                            : '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
                        html += `
                            <div class="song-item${playingCls}" data-id="${escapeHtml(s.id)}">
                                <button class="song-play" data-act="song-play" data-id="${escapeHtml(s.id)}" aria-label="播放">
                                    ${playIcon}
                                </button>
                                <div class="song-body">
                                    <div class="song-title">${escapeHtml(s.title || s.bvid)}</div>
                                    <div class="song-meta">
                                        <span class="song-meta-avatar">${av}</span>
                                        <span>${escapeHtml(s.addedBy || '?')} 加入</span>
                                    </div>
                                </div>
                                <button class="song-delete" data-act="song-delete" data-id="${escapeHtml(s.id)}" aria-label="删除">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
                                </button>
                            </div>`;
                    }
                }

                pane.innerHTML = html;
            }

            // ===== 足迹 / Map render =====
            // Lazy-loads Leaflet on first open. Each moment with lat/lng (or geocoded
            // location text) gets a heart-tinted marker. Click a marker → popup with
            // title + date + thumbnail.
            const mapState = {
                leafletLoaded: false,
                map: null,
                markers: [],
                geoCache: JSON.parse(localStorage.getItem('pourMelodyGeoCache') || '{}')
            };
            function saveGeoCache() {
                try { localStorage.setItem('pourMelodyGeoCache', JSON.stringify(mapState.geoCache)); } catch (_) {}
            }
            function loadLeaflet() {
                return new Promise((resolve, reject) => {
                    if (window.L) return resolve();
                    const s = document.createElement('script');
                    s.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
                    s.onload = () => resolve();
                    s.onerror = () => reject(new Error('Leaflet load failed'));
                    document.head.appendChild(s);
                });
            }
            // Forward-geocode a location string via Nominatim (OpenStreetMap, free).
            // Throttled at ~1 req/sec by our caller. Cached forever in localStorage.
            async function geocodeText(text) {
                if (!text) return null;
                const key = text.toLowerCase().trim();
                if (mapState.geoCache[key]) return mapState.geoCache[key];
                try {
                    const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(text)}`;
                    const res = await fetch(url, { headers: { 'Accept-Language': 'zh,en' } });
                    if (!res.ok) return null;
                    const arr = await res.json();
                    if (!arr.length) return null;
                    const r = { lat: parseFloat(arr[0].lat), lng: parseFloat(arr[0].lon) };
                    mapState.geoCache[key] = r;
                    saveGeoCache();
                    return r;
                } catch (e) {
                    return null;
                }
            }
            async function renderMap() {
                const pane = document.getElementById('feed-pane-map');
                if (!pane) return;
                pane.innerHTML = `
                    <div class="map-toolbar">
                        <div class="map-stats" id="map-stats">加载地图…</div>
                        <button type="button" id="map-fit-btn">居中</button>
                    </div>
                    <div id="map-container"></div>
                `;
                try {
                    await loadLeaflet();
                } catch (e) {
                    pane.innerHTML = '<div class="map-empty">地图加载失败 ✿<br/>检查网络后重试</div>';
                    return;
                }
                const container = document.getElementById('map-container');
                if (mapState.map) { mapState.map.remove(); mapState.map = null; mapState.markers = []; }
                mapState.map = L.map(container, { zoomControl: true, attributionControl: true })
                    .setView([30, 60], 2);
                // Dark-themed OSM tiles (Carto Dark Matter — free for low traffic)
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '© OpenStreetMap · © CARTO',
                    subdomains: 'abcd',
                    maxZoom: 19
                }).addTo(mapState.map);

                // Custom heart icon
                const heartIcon = L.divIcon({
                    html: '<div style="font-size:24px;line-height:1;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.7))">❤</div>',
                    iconSize: [24, 24], iconAnchor: [12, 22], popupAnchor: [0, -22],
                    className: 'map-heart-icon'
                });

                const moments = (momentsBackend.cached || []).slice();
                const withLatLng = moments.filter(m => typeof m.lat === 'number' && typeof m.lng === 'number');
                const needGeocode = moments.filter(m => !withLatLng.includes(m) && m.location);

                // Plot ones we already have coords for
                for (const m of withLatLng) addMarker(m, heartIcon);
                fitBoundsIfPossible();

                document.getElementById('map-stats').textContent = needGeocode.length > 0
                    ? `${withLatLng.length} 处已显示 · 正在为 ${needGeocode.length} 处定位…`
                    : `${withLatLng.length} 处足迹 ❤`;

                // Throttled forward geocoding for moments with only text location.
                // Nominatim asks for 1 req/sec.
                for (const m of needGeocode) {
                    const coords = await geocodeText(m.location);
                    if (coords) {
                        m.lat = coords.lat; m.lng = coords.lng;
                        addMarker(m, heartIcon);
                        // Persist back to Firestore so next time we don't re-geocode
                        try { await momentsBackend.updateLatLng(m.id, coords.lat, coords.lng); } catch (_) {}
                    }
                    await new Promise(r => setTimeout(r, 1100));
                }
                fitBoundsIfPossible();
                const total = mapState.markers.length;
                document.getElementById('map-stats').textContent = total === 0
                    ? '还没有定位过的足迹 ✿（下次发瞬间点 📍 试试）'
                    : `${total} 处足迹 ❤`;

                document.getElementById('map-fit-btn').addEventListener('click', fitBoundsIfPossible);

                function addMarker(m, icon) {
                    const popupHtml = `
                        <div class="map-popup-title">${escapeHtml(m.title || '(无标题)')}</div>
                        <div class="map-popup-date">${escapeHtml(m.author)} · ${escapeHtml(m.date || '')}</div>
                        ${m.location ? `<div class="map-popup-loc">📍 ${escapeHtml(m.location)}</div>` : ''}
                        ${m.photos && m.photos[0] ? `<img class="map-popup-thumb" src="${escapeHtml(m.photos[0])}" alt="">` : ''}
                    `;
                    const mk = L.marker([m.lat, m.lng], { icon }).addTo(mapState.map).bindPopup(popupHtml);
                    mapState.markers.push(mk);
                }
                function fitBoundsIfPossible() {
                    if (mapState.markers.length === 0) return;
                    const bounds = L.latLngBounds(mapState.markers.map(m => m.getLatLng()));
                    mapState.map.fitBounds(bounds, { padding: [40, 40], maxZoom: 10 });
                }
            }

            // ===== 画板 / Drawing render =====
            // Renders a canvas + tool bar. New strokes are added locally as they happen,
            // then persisted to Firestore on stroke-end. Remote strokes appear via the
            // strokesBackend subscription and we redraw the whole canvas.
            //
            // IMPORTANT: renderDraw is called every time the user switches to the 画板 tab,
            // which is more than once if they tab around. We therefore:
            //   1) Render the HTML only on first call (`wired` flag)
            //   2) Attach event listeners only on first call
            //   3) On subsequent calls just redrawAll() + resize the canvas backing store
            // This kills the original bug where each renderDraw added another set of
            // window/pane listeners, which (on Safari + mobile) caused click events on
            // toolbar buttons to be swallowed after a draw.
            const drawState = {
                canvas: null, ctx: null,
                color: '#ff6f9a',
                width: 4,
                drawing: false,
                currentStroke: null,
                wired: false,             // <- guard against re-wiring
                _activePointerId: null,   // pointerdown/up tracking (mouse + touch unified)
            };
            const DRAW_COLORS = ['#ff6f9a', '#ffd166', '#7dd3fc', '#a78bfa', '#ffffff', '#1a0e26'];
            const DRAW_BRUSHES = [{ label: '细', size: 2 }, { label: '中', size: 4 }, { label: '粗', size: 8 }];

            function renderDraw() {
                const pane = document.getElementById('feed-pane-draw');
                if (!pane) return;
                if (drawState.wired) {
                    // Already rendered — just refresh the canvas. Size may have changed
                    // if the user switched tabs and the layout differs, so resync.
                    resizeDrawCanvas();
                    redrawAll();
                    return;
                }
                pane.innerHTML = `
                    <div class="draw-toolbar">
                        ${DRAW_COLORS.map(c => `<button type="button" class="draw-color${c === drawState.color ? ' active' : ''}" data-color="${c}" style="background:${c}" aria-label="颜色"></button>`).join('')}
                        ${DRAW_BRUSHES.map(b => `<button type="button" class="draw-brush${b.size === drawState.width ? ' active' : ''}" data-brush="${b.size}">${b.label}</button>`).join('')}
                        <button type="button" class="draw-undo" id="draw-undo">撤销我的</button>
                        <button type="button" class="draw-clear" id="draw-clear">清空全部</button>
                    </div>
                    <canvas id="draw-canvas" width="800" height="480"></canvas>
                    <div class="draw-hint">在画板上一起画画 ✿ 笔画会实时同步到对方屏幕</div>
                `;
                drawState.canvas = document.getElementById('draw-canvas');
                drawState.ctx = drawState.canvas.getContext('2d');
                resizeDrawCanvas();
                wireDrawInput();
                wireDrawToolbar();
                drawState.wired = true;
                redrawAll();
            }
            function resizeDrawCanvas() {
                if (!drawState.canvas) return;
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                const cssW = drawState.canvas.offsetWidth;
                const cssH = drawState.canvas.offsetHeight;
                if (cssW <= 0 || cssH <= 0) return;  // pane is hidden — try again later
                const targetW = Math.round(cssW * dpr);
                const targetH = Math.round(cssH * dpr);
                if (drawState.canvas.width !== targetW || drawState.canvas.height !== targetH) {
                    drawState.canvas.width  = targetW;
                    drawState.canvas.height = targetH;
                    drawState.ctx.setTransform(1, 0, 0, 1, 0, 0);
                    drawState.ctx.scale(dpr, dpr);
                }
            }
            function redrawAll() {
                if (!drawState.ctx || !drawState.canvas) return;
                const w = drawState.canvas.offsetWidth;
                const h = drawState.canvas.offsetHeight;
                if (w <= 0 || h <= 0) return;
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                drawState.ctx.clearRect(0, 0, drawState.canvas.width / dpr, drawState.canvas.height / dpr);
                for (const s of (strokesBackend.cached || [])) {
                    drawStroke(s, w, h);
                }
                if (drawState.currentStroke) drawStroke(drawState.currentStroke, w, h);
            }
            function drawStroke(s, w, h) {
                const pts = s.points || [];
                if (pts.length < 1) return;
                const ctx2 = drawState.ctx;
                ctx2.lineCap = 'round';
                ctx2.lineJoin = 'round';
                ctx2.strokeStyle = s.color || '#ff6f9a';
                ctx2.lineWidth = s.width || 4;
                if (pts.length === 1) {
                    ctx2.fillStyle = s.color || '#ff6f9a';
                    ctx2.beginPath();
                    ctx2.arc(pts[0].x * w, pts[0].y * h, (s.width || 4) / 2, 0, Math.PI * 2);
                    ctx2.fill();
                } else {
                    ctx2.beginPath();
                    ctx2.moveTo(pts[0].x * w, pts[0].y * h);
                    for (let i = 1; i < pts.length; i++) {
                        ctx2.lineTo(pts[i].x * w, pts[i].y * h);
                    }
                    ctx2.stroke();
                }
            }
            function getPointFromEvent(ev) {
                const rect = drawState.canvas.getBoundingClientRect();
                const t = ev.touches ? ev.touches[0] : ev;
                return {
                    x: (t.clientX - rect.left) / rect.width,
                    y: (t.clientY - rect.top) / rect.height
                };
            }
            // Wire ONLY ONCE. We use Pointer Events where supported — they unify mouse
            // and touch and fire reliably (no synthesized-click weirdness on Safari).
            // Fallback to mouse+touch for very old browsers.
            function wireDrawInput() {
                const canvas = drawState.canvas;
                const usePointer = 'onpointerdown' in window;

                const startDraw = (ev) => {
                    // ONLY preventDefault on the canvas itself; this is what was breaking
                    // toolbar clicks before — the old code called preventDefault on a
                    // *window* mouseup listener, which suppressed the next click on Safari.
                    ev.preventDefault();
                    drawState.drawing = true;
                    drawState.currentStroke = {
                        points: [getPointFromEvent(ev)],
                        color: drawState.color,
                        width: drawState.width,
                        by: currentViewer
                    };
                    redrawAll();
                };
                const moveDraw = (ev) => {
                    if (!drawState.drawing) return;
                    ev.preventDefault();
                    drawState.currentStroke.points.push(getPointFromEvent(ev));
                    redrawAll();
                };
                const endDraw = (ev) => {
                    if (!drawState.drawing) return;
                    // NO preventDefault here. The previous version called preventDefault
                    // on window mouseup, which on Safari can suppress the next click on
                    // *other* elements (toolbar buttons). That was the bug.
                    drawState.drawing = false;
                    const stroke = drawState.currentStroke;
                    drawState.currentStroke = null;
                    if (stroke && stroke.points.length > 0) {
                        // Firestore's client SDK includes local writes in its next
                        // onSnapshot fire immediately (no need for our own optimistic
                        // push). On failure we let the snapshot reconcile naturally.
                        strokesBackend.add(stroke).catch(e => {
                            console.warn('save stroke failed', e);
                            // Force a redraw so any stale local state is cleared
                            redrawAll();
                        });
                    }
                };

                if (usePointer) {
                    canvas.addEventListener('pointerdown', (ev) => {
                        if (drawState.drawing) return;  // ignore secondary fingers
                        drawState._activePointerId = ev.pointerId;
                        try { canvas.setPointerCapture(ev.pointerId); } catch (_) {}
                        startDraw(ev);
                    });
                    canvas.addEventListener('pointermove', (ev) => {
                        if (ev.pointerId !== drawState._activePointerId) return;
                        moveDraw(ev);
                    });
                    const stop = (ev) => {
                        if (ev.pointerId !== drawState._activePointerId) return;
                        drawState._activePointerId = null;
                        try { canvas.releasePointerCapture(ev.pointerId); } catch (_) {}
                        endDraw(ev);
                    };
                    canvas.addEventListener('pointerup', stop);
                    canvas.addEventListener('pointercancel', stop);
                    canvas.addEventListener('pointerleave', (ev) => {
                        // Only end if pointer is up; with pointer capture this rarely fires mid-stroke
                        if (ev.pointerId === drawState._activePointerId && ev.buttons === 0) stop(ev);
                    });
                } else {
                    // Legacy mouse + touch (older browsers, no Pointer Events)
                    canvas.addEventListener('mousedown', startDraw);
                    canvas.addEventListener('mousemove', moveDraw);
                    canvas.addEventListener('mouseup', endDraw);
                    canvas.addEventListener('mouseleave', endDraw);
                    canvas.addEventListener('touchstart', startDraw, { passive: false });
                    canvas.addEventListener('touchmove', moveDraw, { passive: false });
                    canvas.addEventListener('touchend', endDraw);
                    canvas.addEventListener('touchcancel', endDraw);
                }

                // Safety net: if the user releases the button outside the canvas without
                // pointer capture working, this still ends the stroke. We don't call
                // preventDefault here — that's what was killing toolbar clicks before.
                window.addEventListener('mouseup', (ev) => {
                    if (drawState.drawing) endDraw(ev);
                });
            }
            // Wire ONCE — bind directly to each button, no delegated pane listener.
            // Delegated listeners on the pane were never cleaned up across renderDraw
            // calls, causing duplicate confirms/saves.
            function wireDrawToolbar() {
                const pane = document.getElementById('feed-pane-draw');
                pane.querySelectorAll('.draw-color').forEach(btn => {
                    btn.addEventListener('click', () => {
                        drawState.color = btn.getAttribute('data-color');
                        pane.querySelectorAll('.draw-color').forEach(b => b.classList.toggle('active', b === btn));
                    });
                });
                pane.querySelectorAll('.draw-brush').forEach(btn => {
                    btn.addEventListener('click', () => {
                        drawState.width = parseInt(btn.getAttribute('data-brush'), 10);
                        pane.querySelectorAll('.draw-brush').forEach(b => b.classList.toggle('active', b === btn));
                    });
                });
                const clearBtn = document.getElementById('draw-clear');
                const undoBtn  = document.getElementById('draw-undo');
                clearBtn.addEventListener('click', async () => {
                    if (!confirm('确定要清空整个画板吗？\n\n（双方都会看到清空）')) return;
                    clearBtn.disabled = true;
                    try { await strokesBackend.clearAll(); }
                    catch (err) { alert('清空失败：' + (err.message || err)); }
                    finally { clearBtn.disabled = false; }
                });
                undoBtn.addEventListener('click', async () => {
                    const mine = (strokesBackend.cached || []).filter(s => s.by === currentViewer);
                    if (mine.length === 0) return;
                    const last = mine[mine.length - 1];
                    undoBtn.disabled = true;
                    try { await strokesBackend.removeOne(last.id); }
                    catch (err) { alert('撤销失败：' + (err.message || err)); }
                    finally { undoBtn.disabled = false; }
                });
            }
            // Subscribe so remote strokes from the partner appear live
            strokesBackend.subscribe(() => {
                if (momentsOverlay.classList.contains('open') && activeFeedTab === 'draw') redrawAll();
            });
            // Re-render map when new moments land (only if active)
            // Note: we intentionally do NOT auto re-render the map when momentsBackend
            // updates. Doing so caused a re-render storm: during initial geocoding we
            // write lat/lng back to Firestore for each moment (~1/sec), and each write
            // triggers a snapshot which would trigger another renderMap, which would
            // tear down the half-finished old map. Map refreshes on next tab click.

            // Tab switching
            let activeFeedTab = 'moments';
            const feedTabs = document.getElementById('feed-tabs');
            const feedPaneMoments = document.getElementById('feed-pane-moments');
            const feedPaneWishes = document.getElementById('feed-pane-wishes');
            const feedPaneSongs = document.getElementById('feed-pane-songs');
            const feedPaneMap = document.getElementById('feed-pane-map');
            const feedPaneDraw = document.getElementById('feed-pane-draw');
            feedTabs.addEventListener('click', (e) => {
                const btn = e.target.closest('.feed-tab');
                if (!btn) return;
                const tab = btn.getAttribute('data-tab');
                if (tab === activeFeedTab) return;
                activeFeedTab = tab;
                feedTabs.querySelectorAll('.feed-tab').forEach(b => b.classList.toggle('active', b === btn));
                feedPaneMoments.classList.toggle('hidden', tab !== 'moments');
                feedPaneWishes.classList.toggle('hidden', tab !== 'wishes');
                feedPaneSongs.classList.toggle('hidden', tab !== 'songs');
                feedPaneMap.classList.toggle('hidden', tab !== 'map');
                feedPaneDraw.classList.toggle('hidden', tab !== 'draw');
                // The floating "+" publish button only makes sense for moments;
                // other tabs have their own inline controls (or don't need any).
                const pbtn = document.getElementById('publish-btn');
                if (pbtn) pbtn.style.display = tab === 'moments' ? '' : 'none';
                if (tab === 'wishes') renderWishes();
                if (tab === 'songs') renderSongs();
                if (tab === 'map') renderMap();
                if (tab === 'draw') renderDraw();
            });

            // Re-render wishes live when Firestore changes (only if active)
            wishesBackend.subscribe(() => {
                if (momentsOverlay.classList.contains('open') && activeFeedTab === 'wishes') renderWishes();
            });
            // Re-render songs live when Firestore changes (only if active)
            songsBackend.subscribe(() => {
                if (momentsOverlay.classList.contains('open') && activeFeedTab === 'songs') renderSongs();
            });

            // Wishlist interactions — delegated on the wishes pane
            feedPaneWishes.addEventListener('click', async (e) => {
                // Add button
                if (e.target.closest('#wish-add-btn')) {
                    const input = document.getElementById('wish-input');

            // Photo input with client-side compression
            function compressImage(file, maxDim = 1600, quality = 0.85) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => {
                        const img = new Image();
                        img.onload = () => {
                            const ratio = Math.min(1, maxDim / Math.max(img.width, img.height));
                            const w = Math.round(img.width * ratio);
                            const h = Math.round(img.height * ratio);
                            const off = document.createElement('canvas');
                            off.width = w; off.height = h;
                            const ox = off.getContext('2d');
                            ox.drawImage(img, 0, 0, w, h);
                            resolve(off.toDataURL('image/jpeg', quality));
                        };
                        img.onerror = reject;
                        img.src = reader.result;
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            }

            // ===== Location auto-fetch (geolocation + BigDataCloud reverse-geocode) =====
            // BigDataCloud client endpoint is free, no API key needed, works in China.
            async function reverseGeocode(lat, lng) {
                const url = `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}&localityLanguage=zh`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('reverse-geocode HTTP ' + res.status);
                const data = await res.json();
                const parts = [data.city, data.locality, data.principalSubdivision].filter(Boolean);
                const uniq = [];
                for (const p of parts) if (!uniq.includes(p)) uniq.push(p);
                return uniq.join(' · ') || `${lat.toFixed(3)}, ${lng.toFixed(3)}`;
            }
            locateBtn.addEventListener('click', () => {
                if (!navigator.geolocation) {
                    locateStatus.textContent = '浏览器不支持地理定位，手动填写吧 ✿';
                    return;
                }
                locateBtn.classList.add('loading');
                locateStatus.textContent = '正在获取位置…';
                navigator.geolocation.getCurrentPosition(
                    async (pos) => {
                        // Stash coords so this moment lands on the 足迹 map immediately
                        pendingLatLng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        try {
